<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Ryan Rana</title>
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --gray: #6e6e73;
      --gray-light: #8e8e93;
      --rule: rgba(0,0,0,0.09);
      --mono: 'SF Mono','Fira Code','Fira Mono','Courier New',monospace;
      --sans: -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
      /* Spacing scale */
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP: nav + layout ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* NAV — full width, slides down after load */
    #nav {
      flex-shrink: 0;
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      border-bottom: 1px solid var(--rule);
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1),
                  opacity 0.6s ease;
    }
    #nav.show { transform: translateY(0); opacity: 1; }

    /* ── TWO-PANEL LAYOUT ── */
    #layout {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    /* LEFT */
    #left {
      flex: 0 0 46%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .nav-name {
      font-size: 0.9rem; font-weight: 600;
      letter-spacing: -0.02em; text-decoration: none; color: var(--black);
    }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a {
      font-size: 0.8rem; font-weight: 500; color: var(--gray);
      text-decoration: none; letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--black); }

    /* CONTENT AREA */
    #content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* TERMINAL */
    #terminal-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: flex-start;
      padding: 0 44px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #terminal-wrap.hide {
      opacity: 0; transform: translateY(-10px); pointer-events: none;
    }
    #terminal {
      font-family: var(--mono);
      font-size: 1.18rem;
      line-height: 2.05;
      color: var(--black);
    }
    .t-line { display: block; white-space: pre; }
    .t-ok    { color: #1a8c1a; font-weight: 500; }
    .t-gray  { color: var(--gray); }
    .t-comment { color: #c0c0c0; }
    .cursor {
      display: inline-block; width: 7px; height: 1em;
      background: var(--black); vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .t-hint {
      display: flex; align-items: center; gap: 10px;
      margin-top: 22px;
      font-size: 0.74rem; color: #888;
      letter-spacing: 0.05em;
    }
    .t-hint .key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 58px; height: 22px;
      border: 1px solid #bbb; border-radius: 4px;
      font-size: 0.68rem; color: #666; letter-spacing: 0.03em;
    }
    .t-skip {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: #c00;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      margin-left: 4px;
      transition: opacity 0.2s;
    }
    .t-skip:hover { opacity: 0.8; }
    .t-skip.hide { display: none; }

    /* BIO — full-height panels, scroll snap */
    #bio-wrap {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
      pointer-events: none;
    }
    #bio-wrap.show { opacity: 1; transform: none; pointer-events: auto; }

    .bio-intro {
      min-height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-12) 44px var(--space-16);
      box-sizing: border-box;
    }

    .bio-name {
      font-size: clamp(1.85rem, 2.8vw, 2.5rem);
      font-weight: 700; letter-spacing: -0.035em;
      line-height: 1.1; margin-bottom: var(--space-8);
    }
    .bio-para {
      font-size: 0.98rem; line-height: 1.8;
      color: #1d1d1f; margin-bottom: var(--space-6);
      text-decoration: none;
    }
    .bio-para a {
      color: var(--black); text-decoration: underline;
      text-decoration-thickness: 1px; text-underline-offset: 3px;
      transition: opacity 0.15s;
    }
    .bio-para a:hover { opacity: 0.45; }
    .fn {
      font-size: 0.6em; vertical-align: super;
      font-family: var(--mono); color: #666;
      margin-left: 1px; cursor: default; position: relative;
    }
    .fn-tip { display: none; }
    .bio-ref-display {
      font-size: 0.98rem; line-height: 1.55;
      color: #555; margin-bottom: var(--space-8);
      font-weight: 400; min-height: 0;
    }

    /* Section headings — same size/look as Ryan Rana (bio-name); full-height panels, vertically centered */
    .bio-section {
      min-height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      margin-top: 0;
      padding: var(--space-12) 44px var(--space-16);
      border-top: none;
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .bio-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--rule);
    }
    .bio-section:first-of-type { padding-top: var(--space-12); }
    .bio-section:first-of-type::before { display: none; }
    .bio-section-title {
      font-size: clamp(1.85rem, 2.8vw, 2.5rem);
      font-weight: 700; letter-spacing: -0.035em;
      line-height: 1.1;
      color: var(--black);
      margin-bottom: var(--space-6);
    }
    .articles-year {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--gray);
      margin-top: var(--space-6); margin-bottom: var(--space-3);
    }
    .articles-year:first-child { margin-top: 0; }

    /* Articles — chill, natural */
    #articles-section .bio-section-list li {
      margin-bottom: var(--space-4); padding-bottom: var(--space-4);
      border-bottom: none;
      padding-left: 0;
      border-left: none;
    }
    #articles-section .item-title { font-size: 0.95rem; font-weight: 500; }
    #articles-section .item-meta { font-size: 0.8rem; color: var(--gray); font-weight: 400; }
    #articles-section .item-desc.article-excerpt { font-size: 0.9rem; line-height: 1.65; color: #444; }

    /* Experience — timeline feel, compact */
    #experience-section .bio-section-list li {
      margin-bottom: var(--space-4); padding-bottom: var(--space-4);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    #experience-section .bio-section-list li:last-child { border-bottom: none; }
    #experience-section .item-title { font-size: 0.9rem; font-weight: 600; }
    #experience-section .item-meta { font-size: 0.77rem; font-weight: 500; color: var(--gray); }
    #experience-section .item-desc { font-size: 0.84rem; line-height: 1.5; color: #444; }

    /* Projects — 1 bullet, 1 line per project; tags inline, polished */
    #projects-section .bio-section-list {
      list-style: disc;
      padding-left: 1.5rem;
    }
    #projects-section .bio-section-list li {
      margin-bottom: var(--space-4);
      padding-left: 0.35rem;
      line-height: 1.65;
    }
    #projects-section .item-title { font-size: 0.92rem; font-weight: 600; margin: 0; display: inline; letter-spacing: -0.01em; }
    #projects-section .item-title a { display: inline; }
    #projects-section .item-desc { font-size: 0.83rem; color: #555; margin: 0; display: inline; font-weight: 400; }
    #projects-section .project-sep { color: rgba(0,0,0,0.25); font-weight: 300; margin: 0 0.15rem; display: inline; }
    #projects-section .item-skills {
      display: inline;
    }
    #projects-section .project-skill {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #5a5a5a;
      background: rgba(0,0,0,0.055);
      padding: 3px 7px;
      border-radius: 4px;
      display: inline-block;
      margin-right: 0.35rem;
      margin-bottom: 0.15rem;
    }

    /* Shared list + item styles */
    .bio-section-list { list-style: none; }
    .bio-section-list .item-title { margin-bottom: var(--space-2); }
    .bio-section-list .item-title a {
      color: var(--black); text-decoration: none;
      border-bottom: 1px solid transparent; transition: border-color 0.15s;
    }
    .bio-section-list .item-title a:hover { border-bottom-color: var(--black); }
    .bio-section-list .item-meta { margin-bottom: var(--space-2); }
    .bio-section-list .item-desc { font-size: 0.85rem; line-height: 1.55; color: #444; }
    .bio-section-list .item-title-row {
      display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-2);
    }
    .bio-section-list .item-title-row .item-title { margin-bottom: 0; flex: 1; }
    .bio-section-list .item-toggle {
      flex-shrink: 0; width: 24px; height: 24px; padding: 0; border: none;
      background: none; cursor: pointer; color: var(--gray);
      display: inline-flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease, color 0.15s;
    }
    .bio-section-list .item-toggle:hover { color: var(--black); }
    .bio-section-list .item-toggle.open { transform: rotate(90deg); }
    .bio-section-list .item-toggle svg { width: 14px; height: 14px; }
    .bio-section-list .item-desc.article-excerpt { margin-top: var(--space-3); display: none; }
    .bio-section-list .item-desc.article-excerpt.open { display: block; }
    .bio-section-list .item-skills { font-size: 0.75rem; color: var(--gray); margin-top: var(--space-3); }

    .show-more-btn {
      background: none; border: none; font-family: var(--sans);
      font-size: 0.82rem; font-weight: 500; color: var(--gray);
      cursor: pointer; padding: var(--space-3) 0; margin-top: var(--space-4);
      text-decoration: underline; text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .show-more-btn:hover { color: var(--black); }
    .show-more-btn.hidden { display: none; }

    .bio-links {
      display: flex; gap: var(--space-3); flex-wrap: wrap;
      margin-top: var(--space-10); padding-bottom: var(--space-2);
      align-items: center;
    }
    .btn {
      display: inline-flex; align-items: center;
      padding: 9px 20px; border-radius: 980px;
      font-size: 0.78rem; font-weight: 500;
      text-decoration: none; letter-spacing: 0.01em;
      transition: all 0.18s;
      border: none;
    }
    .btn-dark { background: var(--black); color: var(--white); }
    .btn-dark:hover { background: #222; }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.14); color: var(--black);
      text-decoration: none; transition: all 0.18s;
    }
    .icon-btn:hover { background: #f0f0f0; border-color: rgba(0,0,0,0.25); }
    .icon-btn svg { width: 16px; height: 16px; display: block; }

    /* RIGHT — neural net */
    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 32px;
    }
    #nn-wrap {
      width: 100%; height: 100%;
      /* Mobile: contained. Desktop: scale with viewport (proportional) */
      max-width: min(520px, 96%);
      max-height: min(68vh, 520px);
    }
    @media (min-width: 900px) {
      #nn-wrap {
        max-width: min(720px, 46vw);
        max-height: min(85vh, 820px);
      }
    }
    #nn-canvas { display: block; width: 100%; height: 100%; }

    /* hide scrollbar, keep scroll */
    #bio-wrap { scrollbar-width: none; }
    #bio-wrap::-webkit-scrollbar { display: none; }

    /* Footer — at end of scrollable bio, short */
    #site-footer {
      margin-top: 0;
      padding: var(--space-12) 44px var(--space-16);
      padding-top: var(--space-6);
      border-top: 1px solid var(--rule);
      scroll-snap-align: start;
    }
    .footer-line {
      font-size: 0.75rem;
      color: var(--gray);
      margin-bottom: var(--space-2);
    }
    .footer-line a {
      color: var(--gray);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .footer-line a:hover { color: var(--black); border-bottom-color: var(--black); }

    @media (max-width: 720px) {
      #layout {
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #right {
        order: -1;
        flex: 0 0 auto;
        height: 42vh;
        min-height: 280px;
        padding: 20px 14px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #left {
        order: 0;
        flex: 0 0 auto;
        overflow: visible;
      }
      /* Single scroll: content flows in layout, no inner scroll */
      #content-area {
        overflow: visible;
      }
      /* Terminal wrap in flow so Enter/Skip are reachable; align top */
      #terminal-wrap {
        position: relative;
        min-height: 100%;
        align-items: flex-start;
        padding-top: 24px;
        padding-bottom: max(var(--space-12), env(safe-area-inset-bottom));
      }
      #terminal-wrap.hide {
        position: absolute;
        height: 0;
        overflow: hidden;
        padding: 0;
      }
      /* Bio in flow when shown so one layout scroll (no nested scroll) */
      #bio-wrap {
        position: absolute;
        height: 0;
        overflow: hidden;
        pointer-events: none;
      }
      #bio-wrap.show {
        position: relative;
        height: auto;
        overflow: visible;
        pointer-events: auto;
        scroll-snap-type: none;
      }
      .bio-intro, .bio-section { min-height: 0; }
      #nn-wrap {
        flex: 1;
        min-height: 220px;
        width: 100%;
        max-width: none;
        max-height: none;
      }
      #terminal-wrap:not(.hide), #bio-wrap { padding-left: 14px; padding-right: 14px; }
      #bio-wrap { padding-bottom: var(--space-12); }
      #terminal .t-line { white-space: pre-wrap; word-break: break-word; }
      #nav { padding: 0 14px; flex-wrap: wrap; gap: 8px; }
      .nav-links { display: flex; flex-wrap: wrap; gap: 16px; }
      .nav-links a { font-size: 0.75rem; }
      .bio-section { margin-top: 0; padding-top: var(--space-12); }
      .bio-section:first-of-type { margin-top: var(--space-10); padding-top: 0; }
      .bio-links { margin-top: var(--space-8); }
    }

    /* Short viewport (e.g. landscape phone, small window): same scrollable terminal as mobile */
    @media (max-height: 560px) {
      #left { overflow: hidden; }
      #content-area {
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #terminal-wrap {
        position: relative;
        min-height: 100%;
        align-items: flex-start;
        padding-top: 24px;
        padding-bottom: max(var(--space-12), env(safe-area-inset-bottom));
      }
      #terminal-wrap.hide {
        position: absolute;
        height: 0;
        overflow: hidden;
        padding: 0;
      }
    }
  </style>
</head>

<div id="app">

    <a class="nav-name" href="#">Ryan Rana</a>
    <ul class="nav-links">
      <li><a href="#experience-section">Experience</a></li>
      <li><a href="#projects-section">Projects</a></li>
      <li><a href="#articles-section">Articles</a></li>
      <li><a href="ryan_rana.pdf" target="_blank" rel="noopener">Resume</a></li>
    </ul>
  </nav>

  <div id="layout">

    <div id="left">

<script>
/* ══════════════════════════
   TERMINAL
══════════════════════════ */
(function () {
  const SESSION_KEY = 'ryanrana_intro_done';

  const LINES = [
    { id: 'tl0', text: '>>> r = requests.get("/user").json()', cls: '' },
    { id: 'tl1', text: '200 OK', cls: 't-ok' },
    { id: 'tl2', text: '>>> print(r["name"], r.get("superpower"))', cls: '' },
    { id: 'tl3', text: 'ryan rana programming', cls: 't-gray' },
    { id: 'tl4', text: '>>> print(open("bio.txt").read())', cls: '' },
    { id: 'tl5', text: '', cls: '' },
  ];

  let step = 0;
  let typing = false;
  let revealed = false;

  const cur = document.createElement('span');
  cur.className = 'cursor';

  function typeLine(el, text, cls, cb) {
    if (cls) el.className = 't-line ' + cls;
    if (cur.parentNode) cur.parentNode.removeChild(cur);
    el.appendChild(cur);
    if (!text) { cb && cb(); return; }
    let i = 0;
    const iv = setInterval(() => {
      cur.before(document.createTextNode(text[i++]));
      if (i >= text.length) { clearInterval(iv); cb && cb(); }
    }, 24);
  }

  function runSequence(resultIdx, nextPromptIdx, then) {
    const result = LINES[resultIdx];
    const resultEl = document.getElementById(result.id);
    typeLine(resultEl, result.text, result.cls, () => {
      if (nextPromptIdx == null) { then && then(); return; }
      const next = LINES[nextPromptIdx];
      typeLine(document.getElementById(next.id), next.text, next.cls, () => { typing = false; then && then(); });
    });
  }

  function hideSkip() {
    const s = document.getElementById('t-skip');
    if (s) s.classList.add('hide');
  }

  function advance() {
    if (typing || revealed) return;
    hideSkip();
    typing = true;
    if (window.__nnRearrange) window.__nnRearrange();

    if (step === 0) {
      // Show 200 OK, then type second line (print name/superpower)
      runSequence(1, 2, () => { step = 1; });
    } else if (step === 1) {
      // Show print output, then type third line (print bio.txt)
      runSequence(3, 4, () => { step = 2; });
    } else {
      // Reveal everything (skip typing bio result)
      typing = false;
      reveal();
    }
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    try { sessionStorage.setItem(SESSION_KEY, '1'); } catch (_) {}
    if (cur.parentNode) cur.parentNode.removeChild(cur);
    document.getElementById('terminal-wrap').classList.add('hide');
    setTimeout(function () {
      document.getElementById('nav').classList.add('show');
      document.getElementById('bio-wrap').classList.add('show');
    }, 260);
  }

  // Skip terminal if user already completed intro this session
  try {
    if (sessionStorage.getItem(SESSION_KEY)) {
      reveal();
      return;
    }
  } catch (_) {}

  // Type first prompt on load; show Enter + Skip hint when ready
  setTimeout(function () {
    typing = true;
    typeLine(document.getElementById('tl0'), LINES[0].text, LINES[0].cls, function () {
      typing = false;
      var hint = document.getElementById('t-hint');
      if (hint) hint.style.opacity = '1';
    });
  }, 400);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter') {
      e.preventDefault();
      if (revealed) { if (window.__nnRearrange) window.__nnRearrange(); }
      else advance();
    }
    if (e.code === 'Space') { e.preventDefault(); if (window.__nnRearrange) window.__nnRearrange(); }
  });
  document.getElementById('left').addEventListener('click', () => {
    if (!typing) advance();
  });
  const skipBtn = document.getElementById('t-skip');
  if (skipBtn) {
    skipBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (revealed) return;
      hideSkip();
      reveal();
    });
  }
})();

/* Bio — load from data/bio.json and render name + paragraphs + refs */
(function () {
  const codeStyle = 'font-size:0.88em;letter-spacing:-0.02em';
  function esc(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  function renderPart(part, refs) {
    if (part.text) return [document.createTextNode(part.text)];
    if (part.code) {
      var code = document.createElement('code');
      code.style.cssText = codeStyle;
      code.textContent = part.code;
      return [code];
    }
    if (part.link) {
      var a = document.createElement('a');
      a.href = part.link.href;
      a.textContent = part.link.text;
      if (part.link.href.indexOf('http') === 0) {
        a.target = '_blank';
        a.rel = 'noopener';
      }
      return [a];
    }
    if (part.ref != null && refs) {
      var num = String(part.ref);
      var tip = refs[num] || '';
      var span = document.createElement('span');
      span.className = 'fn';
      span.appendChild(document.createTextNode(num));
      var tipSpan = document.createElement('span');
      tipSpan.className = 'fn-tip';
      tipSpan.textContent = tip;
      span.appendChild(tipSpan);
      return [span];
    }
    return [];
  }
  fetch('data/bio.json?t=' + Date.now())
    .then(function (r) { return r.ok ? r.json() : null; })
    .catch(function () { return null; })
    .then(function (data) {
      if (!data) return;
      var nameEl = document.getElementById('bio-name');
      var parasEl = document.getElementById('bio-paras');
      if (nameEl) nameEl.textContent = data.name || '';
      if (!parasEl || !data.paragraphs || !data.references) return;
      var refs = data.references;
      data.paragraphs.forEach(function (para) {
        if (!para.parts) return;
        var p = document.createElement('p');
        p.className = 'bio-para';
        para.parts.forEach(function (part) {
          renderPart(part, refs).forEach(function (node) { p.appendChild(node); });
        });
        parasEl.appendChild(p);
      });
    });
})();

/* Copy email + footnote ref display (event delegation for dynamic .fn) */
(function () {
  const email = 'ryanrana04@gmail.com';
  const btn = document.getElementById('copy-email-btn');
  const refDisplay = document.getElementById('bio-ref-display');
  if (btn) {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(email).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy email'; }, 1800);
      });

  }
  function showRefForFn(fn, refDisplay) {
    var tip = fn && fn.querySelector('.fn-tip');
    if (!tip || !refDisplay) return;
    var numNode = Array.from(fn.childNodes).find(function (n) { return n.nodeType === 3; });
    var num = numNode ? numNode.textContent.trim() : '';
    refDisplay.textContent = (num ? num + '. ' : '') + tip.textContent.trim();
  }
  var intro = document.getElementById('bio-intro');
  if (intro && refDisplay) {
    intro.addEventListener('mouseenter', function (e) {
      var fn = e.target.closest && e.target.closest('.fn');
      if (!fn) return;
      showRefForFn(fn, refDisplay);
    }, true);
    intro.addEventListener('click', function (e) {
      var fn = e.target.closest && e.target.closest('.fn');
      if (!fn) return;
      e.preventDefault();
      showRefForFn(fn, refDisplay);
    }, true);
  }
})();

/* Nav: scroll to section when Experience / Projects / Articles clicked */
(function () {
  var wrap = document.getElementById('bio-wrap');
  var links = document.querySelectorAll('.nav-links a[href^="#"]');
  links.forEach(function (a) {
    a.addEventListener('click', function (e) {
      var id = a.getAttribute('href').slice(1);
      var el = document.getElementById(id);
      if (el && wrap) {
        e.preventDefault();
        wrap.scrollTo({ top: el.offsetTop - 24, behavior: 'smooth' });
      }

/* When scrolled to a new section, rearrange the neural net */
(function () {
  var wrap = document.getElementById('bio-wrap');
  if (!wrap) return;
  var panels = [
    document.getElementById('bio-intro'),
    document.getElementById('experience-section'),
    document.getElementById('projects-section'),
    document.getElementById('articles-section')
  ].filter(Boolean);
  var lastActive = null;
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.intersectionRatio < 0.4) return;
      var id = entry.target.id || 'bio-intro';
      if (lastActive !== null && lastActive !== id && typeof window.__nnRearrange === 'function') {
        window.__nnRearrange();
      }
      lastActive = id;
    });
  }, { root: wrap, threshold: [0.25, 0.4, 0.5, 0.75, 1] });
  panels.forEach(function (el) { if (el) observer.observe(el); });
})();

/* Articles, Experience, Projects — load JSON, show 5 at a time */
(function () {
  const PAGE = 5;

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function parseYear(dateStr) {
    if (!dateStr) return 0;
    const m = dateStr.match(/\b(19|20)\d{2}\b/);
    return m ? parseInt(m[0], 10) : 0;
  }

  function renderArticleItem(item, list) {
    const hasExcerpt = item.excerpt && item.excerpt.length > 0;
    const titleRow = '<div class="item-title-row">' +
      '<div class="item-title"><a href="' + (item.url || '#') + '" target="_blank" rel="noopener">' + escapeHtml(item.title) + '</a></div>' +
      (hasExcerpt ? '<button type="button" class="item-toggle" aria-label="Show excerpt"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>' : '') +
      '</div>';
    const meta = item.date ? '<div class="item-meta">' + escapeHtml(item.date) + '</div>' : '';
    const excerptDiv = hasExcerpt ? '<div class="item-desc article-excerpt">' + escapeHtml(item.excerpt) + '</div>' : '';
    const li = document.createElement('li');
    li.innerHTML = titleRow + meta + excerptDiv;
    if (hasExcerpt) {
      const toggle = li.querySelector('.item-toggle');
      const excerpt = li.querySelector('.article-excerpt');
      toggle.addEventListener('click', function () {
        toggle.classList.toggle('open');
        excerpt.classList.toggle('open');
      });
    }
    list.appendChild(li);
  }

  function setupSection(listId, moreBtnId, data) {
    const list = document.getElementById(listId);
    const btn = document.getElementById(moreBtnId);
    if (!list || !btn || !data || !data.length) {
      if (btn) btn.classList.add('hidden');
      return;
    }
    var sortedData = data.slice();
    if (listId === 'articles-list') {
      sortedData.sort(function (a, b) { return parseYear(b.date) - parseYear(a.date) || 0; });
    }
    var shown = Math.min(PAGE, sortedData.length);
    function update() {
      var toShow = sortedData.slice(0, shown);
      list.innerHTML = '';
      if (listId === 'articles-list') {
        var byYear = {};
        toShow.forEach(function (item) {
          var y = parseYear(item.date) || 'Other';
          if (!byYear[y]) byYear[y] = [];
          byYear[y].push(item);
        });
        var years = Object.keys(byYear).sort(function (a, b) { return Number(b) - Number(a); });
        years.forEach(function (year) {
          var yearEl = document.createElement('div');
          yearEl.className = 'articles-year';
          yearEl.textContent = year;
          list.appendChild(yearEl);
          byYear[year].forEach(function (item) { renderArticleItem(item, list); });
        });
      } else {
        toShow.forEach(function (item) {
          var li = document.createElement('li');
          if (listId === 'experience-list') {
            var meta = [item.company, item.date].filter(Boolean).join(' · ');
            li.innerHTML = '<div class="item-title">' + escapeHtml(item.title) + '</div>' +
              (meta ? '<div class="item-meta">' + escapeHtml(meta) + '</div>' : '') +
              (item.description ? '<div class="item-desc">' + escapeHtml(item.description) + '</div>' : '');
          } else {
            var skillsHtml = '';
            if (item.skills && item.skills.length) {
              skillsHtml = '<div class="item-skills">' + item.skills.map(function (s) {
                return '<span class="project-skill">' + escapeHtml(s) + '</span>';
              }).join('') + '</div>';
            }
            var sep = item.description ? ' <span class="project-sep">—</span> ' : '';
            li.innerHTML = '<span class="item-title"><a href="' + (item.url || '#') + '" target="_blank" rel="noopener">' + escapeHtml(item.title) + '</a></span>' +
              (item.description ? sep + '<span class="item-desc">' + escapeHtml(item.description) + '</span>' : '') + (skillsHtml ? ' ' + skillsHtml : '');
          }
          list.appendChild(li);
        });
      }
      if (shown >= sortedData.length) btn.classList.add('hidden');
      else { btn.classList.remove('hidden'); btn.textContent = 'Show more'; }
    }
    btn.addEventListener('click', function () {
      shown = Math.min(shown + PAGE, sortedData.length);
      update();
    });
    update();
  }

  const DATA_DIR = 'data/';
  function loadJson(path) {
    return fetch(DATA_DIR + path + '?t=' + Date.now()).then(function (r) { return r.ok ? r.json() : []; }).catch(function () { return []; });
  }
  Promise.all([
    loadJson('articles.json'),
    loadJson('experience.json'),
    loadJson('projects.json')
  ]).then(function (results) {
    var articles = Array.isArray(results[0]) ? results[0] : [];
    var experience = Array.isArray(results[1]) ? results[1] : [];
    var projects = Array.isArray(results[2]) ? results[2] : [];
    setupSection('articles-list', 'articles-more', articles);
    setupSection('experience-list', 'experience-more', experience);
    setupSection('projects-list', 'projects-more', projects);
  });
})();

/* ══════════════════════════
   NEURAL NET — responsive + high-DPI
══════════════════════════ */
(function () {
  const wrap   = document.getElementById('nn-wrap');
  const canvas = document.getElementById('nn-canvas');
  const ctx    = canvas.getContext('2d');

  let W = 0, H = 0;
  let mouse = { x: -999, y: -999 };

  const PULL = 0.32, SPRING = 0.05, DRAG = 0.85, MAX_SPD = 12, FADE_MS = 500;

  // Complexity by viewport width (right panel / container width)
  function getConfig(width) {
    if (width < 520)  return { N: 20,  START: [3, 5, 5, 5, 2],              R: 3.5, MOUSE_R: 140, maxH: 6 };
    if (width < 900)  return { N: 36,  START: [3, 6, 8, 7, 6, 4, 2],       R: 4.5, MOUSE_R: 200, maxH: 10 };
    if (width < 1400) return { N: 48,  START: [4, 8, 10, 12, 8, 4, 2],     R: 4,   MOUSE_R: 240, maxH: 12 };
    if (width < 2000) return { N: 64,  START: [4, 10, 12, 14, 10, 8, 4, 2], R: 3.5, MOUSE_R: 280, maxH: 14 };
    return { N: 80, START: [4, 10, 12, 14, 14, 12, 8, 4, 2], R: 3, MOUSE_R: 320, maxH: 16 };
  }

  let config = getConfig(400);
  let nodes = [];
  let targets = [];
  let prevEdges = [], nextEdges = [];
  let fade = 1;
  let usedKeys = new Set();

  function randSizes() {
    const { N, maxH } = config;
    const inOut = 3 + 2;
    let rem = N - inOut;
    for (let a = 0; a < 400; a++) {
      const nl = 3 + Math.floor(Math.random() * 5);
      let left = rem;
      const sizes = [];
      for (let L = 0; L < nl - 2; L++) {
        const last = L === nl - 3;
        const hi = Math.min(maxH, left - (nl - 3 - L));
        if (hi < 2) { left = -1; break; }
        const n = last ? left : 2 + Math.floor(Math.random() * (hi - 1));
        sizes.push(n);
        left -= n;
      }
      if (left !== 0) continue;
      const ls = [3, ...sizes, 2];
      const key = ls.join(',');
      if (ls.reduce((a,b)=>a+b,0) === N && !usedKeys.has(key)) {
        usedKeys.add(key);
        return ls;
      }
    }
    usedKeys.clear();
    return config.START.slice();
  }

  function buildLayout(ls) {
    const pos = [], edg = [];
    const mX = W * 0.09, mY = H * 0.07;
    const uW = W - mX * 2;
    const nl = ls.length;
    let idx = 0;
    const starts = [];
    const maxGap = config.N <= 24 ? 46 : config.N <= 36 ? 38 : 32;
    for (let L = 0; L < nl; L++) {
      const cnt = ls[L];
      starts.push(idx);
      const bx = mX + (L / (nl - 1)) * uW;
      const gap = Math.min((H - mY * 2) / (cnt + 1), maxGap);
      const sy  = H / 2 - (gap * (cnt - 1)) / 2;
      for (let i = 0; i < cnt; i++) {
        pos.push({ x: bx, y: sy + i * gap });
        idx++;
      }
    }
    for (let L = 0; L < nl - 1; L++)
      for (let i = 0; i < ls[L]; i++)
        for (let j = 0; j < ls[L+1]; j++)
          edg.push({ from: starts[L]+i, to: starts[L+1]+j });
    return { pos, edg };
  }

  function apply(ls, instant) {
    const { pos, edg } = buildLayout(ls);
    targets = pos;
    if (instant) { prevEdges = edg; nextEdges = edg; fade = 1; }
    else         { prevEdges = nextEdges.length ? nextEdges : edg; nextEdges = edg; fade = 0; }
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    const newConfig = getConfig(W);
    const prevN = config.N;
    config = newConfig;

    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (nodes.length !== config.N) {
      nodes = [];
      for (let i = 0; i < config.N; i++)
        nodes.push({ x: 0, y: 0, vx: 0, vy: 0 });
      targets = [];
      prevEdges = [];
      nextEdges = [];
      usedKeys = new Set();
    }

    apply(config.START, true);
    for (let i = 0; i < config.N; i++) {
      nodes[i].x = targets[i].x;
      nodes[i].y = targets[i].y;
      nodes[i].vx = 0;
      nodes[i].vy = 0;
    }
  }

  function tick(dt) {
    const N = config.N, R = config.MOUSE_R;
    if (fade < 1) fade = Math.min(1, fade + dt / FADE_MS);
    const dn = Math.min(dt / 16, 2);
    for (let i = 0; i < N; i++) {
      const n = nodes[i], t = targets[i];
      n.vx += (t.x - n.x) * SPRING * dn;
      n.vy += (t.y - n.y) * SPRING * dn;
      const dx = mouse.x - n.x, dy = mouse.y - n.y;
      const d  = Math.hypot(dx, dy) || 0.001;
      if (d < R) {
        const f = PULL * (1 - d / R) * dn;
        n.vx += dx / d * f; n.vy += dy / d * f;
      }
      n.vx *= DRAG; n.vy *= DRAG;
      const spd = Math.hypot(n.vx, n.vy);
      if (spd > MAX_SPD) { n.vx = n.vx/spd*MAX_SPD; n.vy = n.vy/spd*MAX_SPD; }
      n.x += n.vx; n.y += n.vy;
    }
  }

  function drawEdges(list, alpha) {
    if (!alpha || !list.length) return;
    const N = config.N;
    const lineW = N <= 24 ? 0.6 : N <= 36 ? 0.5 : 0.4;
    const baseAlpha = N <= 24 ? 0.28 : N <= 48 ? 0.22 : 0.16;
    ctx.strokeStyle = `rgba(0,0,0,${(alpha * baseAlpha).toFixed(3)})`;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    for (const e of list) {
      const a = nodes[e.from], b = nodes[e.to];
      ctx.moveTo(Math.round(a.x), Math.round(a.y));
      ctx.lineTo(Math.round(b.x), Math.round(b.y));
    }
    ctx.stroke();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawEdges(prevEdges, 1 - fade);
    drawEdges(nextEdges, fade);
    const R = config.R;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.78)';
    ctx.lineWidth = 1;
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(Math.round(n.x), Math.round(n.y), R, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  }

  let last = performance.now();
  function loop(now) {
    tick(now - last); last = now;
    render();
    requestAnimationFrame(loop);
  }

  function updateMouseFromEvent(e) {
    const r = canvas.getBoundingClientRect();
    if (!r.width || !r.height) return;
    const x = e.clientX - r.left, y = e.clientY - r.top;
    if (x >= 0 && x <= r.width && y >= 0 && y <= r.height) {
      mouse.x = x * (W / r.width);
      mouse.y = y * (H / r.height);
    } else {
      mouse.x = -999; mouse.y = -999;
    }
  }
  canvas.addEventListener('mousemove', updateMouseFromEvent);
  canvas.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });
  document.addEventListener('mousemove', updateMouseFromEvent);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' && document.getElementById('terminal-wrap').classList.contains('hide'))
      apply(randSizes(), false);
  });

  window.__nnRearrange = () => apply(randSizes(), false);

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
