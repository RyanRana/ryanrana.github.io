<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Ryan Rana</title>
  <style>
    :root {
      color-scheme: light dark;
      --black: #000;
      --white: #fff;
      --gray: #6e6e73;
      --gray-light: #8e8e93;
      --rule: rgba(0,0,0,0.09);
      --fg-strong: #1d1d1f;
      --fg-muted: #444;
      --fg-subtle: #555;
      --fg-faint: #666;
      --fg-dim: #888;
      --surface-muted: rgba(0,0,0,0.055);
      --surface-hover: #f0f0f0;
      --border-soft: rgba(0,0,0,0.14);
      --border-hover: rgba(0,0,0,0.25);
      --border-hairline: rgba(0,0,0,0.06);
      --project-sep: rgba(0,0,0,0.25);
      --accent-green: #0f7a0f;
      --accent-red: #c00;
      --t-gray: #3a3a3d;
      --t-comment: #c0c0c0;
      --key-border: #bbb;
      --btn-dark-hover: #222;
      --shelf-plank: #1a1a1a;
      --book-rest-bg: #e6e6e6;
      --book-rest-fg: #3a3a3a;
      --book-brand: #e8e8e8;
      --book-contrast: #1a1a1a;
      --book-border: rgba(0,0,0,0.22);
      --book-border-cloth: rgba(0,0,0,0.32);
      --book-border-hover: rgba(0,0,0,0.35);
      --book-shadow: rgba(0,0,0,0.10);
      --book-shadow-cloth: rgba(0,0,0,0.14);
      --book-shadow-hover: rgba(0,0,0,0.22);
      --nn-fg-rgb: 0,0,0;
      --nn-node-fill: #fff;
      --mono: 'SF Mono','Fira Code','Fira Mono','Courier New',monospace;
      --sans: -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
      /* Spacing scale */
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --black: #f5f5f7;
        --white: #000;
        --gray: #86868b;
        --gray-light: #6e6e73;
        --rule: rgba(255,255,255,0.1);
        --fg-strong: #e8e8ea;
        --fg-muted: #b8b8bc;
        --fg-subtle: #a8a8ac;
        --fg-faint: #8e8e93;
        --fg-dim: #6e6e73;
        --surface-muted: rgba(255,255,255,0.08);
        --surface-hover: #1c1c1e;
        --border-soft: rgba(255,255,255,0.14);
        --border-hover: rgba(255,255,255,0.28);
        --border-hairline: rgba(255,255,255,0.08);
        --project-sep: rgba(255,255,255,0.28);
        --accent-green: #4ade80;
        --accent-red: #ff6b6b;
        --t-gray: #c8c8cc;
        --t-comment: #4a4a4d;
        --key-border: #555;
        --btn-dark-hover: #d4d4d4;
        --shelf-plank: #d0d0d0;
        --book-rest-bg: #2a2a2c;
        --book-rest-fg: #c8c8cc;
        --book-brand: #3a3a3c;
        --book-contrast: #f0f0f2;
        --book-border: rgba(255,255,255,0.18);
        --book-border-cloth: rgba(255,255,255,0.28);
        --book-border-hover: rgba(255,255,255,0.4);
        --book-shadow: rgba(0,0,0,0.5);
        --book-shadow-cloth: rgba(0,0,0,0.6);
        --book-shadow-hover: rgba(0,0,0,0.7);
        --nn-fg-rgb: 228,230,236;
        --nn-node-fill: #0a0a0c;
      }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP: nav + layout ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* NAV — full width, slides down after load */
    #nav {
      flex-shrink: 0;
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      border-bottom: 1px solid var(--rule);
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1),
                  opacity 0.6s ease;
    }
    #nav.show { transform: translateY(0); opacity: 1; }

    /* ── TWO-PANEL LAYOUT ── */
    #layout {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    /* LEFT */
    #left {
      flex: 0 0 46%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .nav-name {
      font-size: 0.9rem; font-weight: 600;
      letter-spacing: -0.02em; text-decoration: none; color: var(--black);
    }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a {
      font-size: 0.8rem; font-weight: 500; color: var(--gray);
      text-decoration: none; letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--black); }

    /* CONTENT AREA */
    #content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* TERMINAL */
    #terminal-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: flex-start;
      padding: 0 var(--space-8) 0 clamp(44px, 9%, 96px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #terminal-wrap.hide {
      opacity: 0; transform: translateY(-10px); pointer-events: none;
    }
    #terminal {
      font-family: var(--mono);
      font-size: 1.32rem;
      line-height: 2.05;
      font-weight: 500;
      color: var(--black);
    }
    .t-line { display: block; white-space: pre; }
    .t-ok    { color: var(--accent-green); font-weight: 600; }
    .t-gray  { color: var(--t-gray); font-weight: 500; }
    .t-comment { color: var(--t-comment); }
    .cursor {
      display: inline-block; width: 7px; height: 1em;
      background: var(--black); vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .t-hint {
      display: flex; align-items: center; gap: 10px;
      margin-top: 22px;
      font-size: 0.74rem; color: var(--fg-dim);
      letter-spacing: 0.05em;
    }
    .t-hint .key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 58px; height: 22px;
      border: 1px solid var(--key-border); border-radius: 4px;
      font-size: 0.68rem; color: var(--fg-faint); letter-spacing: 0.03em;
    }
    .t-skip {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent-red);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      margin-left: 4px;
      transition: opacity 0.2s;
    }
    .t-skip:hover { opacity: 0.8; }
    .t-skip.hide { display: none; }

    /* BIO — full-height panels, scroll snap */
    #bio-wrap {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
      pointer-events: none;
    }
    #bio-wrap.show { opacity: 1; transform: none; pointer-events: auto; }

    .bio-intro {
      min-height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-12) var(--space-8) var(--space-16) clamp(44px, 9%, 96px);
      box-sizing: border-box;
    }

    .bio-header {
      display: flex;
      align-items: flex-end;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .bio-header picture {
      display: block;
      width: clamp(140px, 24%, 220px);
      flex-shrink: 0;
    }
    .bio-avatar {
      display: block;
      width: 100%;
      height: auto;
    }
    .bio-header .bio-name {
      flex: 1;
      text-align: left;
      margin: 0;
      line-height: 1;
    }
    .bio-name {
      font-size: clamp(1.6rem, 2.6vw, 2.4rem);
      font-weight: 400; letter-spacing: 0;
      line-height: 1.02; margin-bottom: 0;
      text-transform: lowercase;
      white-space: nowrap;
    }
    .bio-name-ext {
      display: inline-block;
      letter-spacing: 0;
      vertical-align: baseline;
    }
    .bio-para {
      font-size: 1.14rem; line-height: 1.75;
      color: var(--fg-strong); margin-bottom: var(--space-6);
      text-decoration: none;
    }
    .bio-para a {
      color: var(--black); text-decoration: underline;
      text-decoration-thickness: 1px; text-underline-offset: 3px;
      transition: opacity 0.15s;
    }
    .bio-para a:hover { opacity: 0.45; }
    .fn {
      font-size: 0.6em; vertical-align: super;
      font-family: var(--mono); color: var(--fg-faint);
      margin-left: 1px; cursor: default; position: relative;
    }
    .fn-tip { display: none; }
    .bio-ref-display {
      font-size: 1.08rem; line-height: 1.6;
      color: var(--fg-subtle); margin-bottom: var(--space-8);
      font-weight: 400; min-height: 0;
    }

    /* Section headings — same size/look as Ryan Rana (bio-name); full-height panels, vertically centered */
    .bio-section {
      min-height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      margin-top: 0;
      padding: var(--space-12) var(--space-8) var(--space-16) clamp(44px, 9%, 96px);
      border-top: none;
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .bio-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--rule);
    }
    .bio-section:first-of-type { padding-top: var(--space-12); }
    .bio-section:first-of-type::before { display: none; }
    .bio-section-title {
      font-size: clamp(2.3rem, 3.6vw, 3.2rem);
      font-weight: 700; letter-spacing: -0.035em;
      line-height: 1.08;
      color: var(--black);
      margin-bottom: var(--space-6);
    }
    .articles-year {
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--gray);
      margin-top: var(--space-6); margin-bottom: var(--space-3);
    }
    .articles-year:first-child { margin-top: 0; }

    /* Articles — chill, natural */
    #articles-section .bio-section-list li {
      margin-bottom: var(--space-4); padding-bottom: var(--space-4);
      border-bottom: none;
      padding-left: 0;
      border-left: none;
    }
    #articles-section .item-title { font-size: 1.08rem; font-weight: 500; }
    #articles-section .item-meta { font-size: 0.88rem; color: var(--gray); font-weight: 400; }
    #articles-section .item-desc.article-excerpt { font-size: 1rem; line-height: 1.65; color: var(--fg-muted); }

    /* Experience — timeline feel, compact */
    #experience-section .bio-section-list li {
      margin-bottom: var(--space-4); padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border-hairline);
    }
    #experience-section .bio-section-list li:last-child { border-bottom: none; }
    #experience-section .item-title { font-size: 1.02rem; font-weight: 600; }
    #experience-section .item-meta { font-size: 0.86rem; font-weight: 500; color: var(--gray); }
    #experience-section .item-desc { font-size: 0.94rem; line-height: 1.55; color: var(--fg-muted); }

    /* Projects — 1 bullet, 1 line per project; tags inline, polished */
    #projects-section .bio-section-list {
      list-style: disc;
      padding-left: 1.5rem;
    }
    #projects-section .bio-section-list li {
      margin-bottom: var(--space-4);
      padding-left: 0.35rem;
      line-height: 1.65;
    }
    #projects-section .item-title { font-size: 1.05rem; font-weight: 600; margin: 0; display: inline; letter-spacing: -0.01em; }
    #projects-section .item-title a { display: inline; }
    #projects-section .item-desc { font-size: 0.95rem; color: var(--fg-subtle); margin: 0; display: inline; font-weight: 400; }
    #projects-section .project-sep { color: var(--project-sep); font-weight: 300; margin: 0 0.15rem; display: inline; }
    #projects-section .item-skills {
      display: inline;
    }
    #projects-section .project-skill {
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--fg-subtle);
      background: var(--surface-muted);
      padding: 3px 7px;
      border-radius: 4px;
      display: inline-block;
      margin-right: 0.35rem;
      margin-bottom: 0.15rem;
    }

    /* BOOKSHELF */
    #bookshelf-section .shelf-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    #bookshelf-section .shelf-header .bio-section-title { margin-bottom: 0; }

    .shelf-lamp {
      position: relative;
      width: 140px;
      height: 60px;
      flex-shrink: 0;
      overflow: visible;
      margin-top: -28px;
    }
    .shelf-lamp .lamp-string {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1.5px;
      height: 22px;
      background: #9a9a9a;
      transform: translateX(-0.75px);
      z-index: 2;
    }
    .shelf-lamp .lamp-shade {
      position: absolute;
      top: 22px;
      left: 50%;
      margin-left: -28px;
      width: 56px;
      height: 0;
      border-bottom: 46px solid #2a2a2a;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-radius: 5px 5px 0 0;
      z-index: 3;
    }
    .shelf-lamp .lamp-bulb {
      position: absolute;
      top: 52px;
      left: 50%;
      margin-left: -13px;
      width: 26px;
      height: 26px;
      background: #6b6b6b;
      border-radius: 50%;
      z-index: 1;
      transition: background 300ms, box-shadow 300ms;
    }
    .shelf-lamp .lamp-pull {
      position: absolute;
      top: 58px;
      left: 50%;
      margin-left: 18px;
      width: 14px;
      height: 82px;
      display: block;
      cursor: pointer;
      z-index: 2;
      transform-origin: top center;
      transition: transform 280ms cubic-bezier(.3,1.4,.5,1);
    }
    .shelf-lamp .lamp-pull:hover { transform: translateY(3px); }
    .shelf-lamp .lamp-pull:active { transform: translateY(8px); }
    .shelf-lamp .lamp-pull .lamp-pull-cord {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1.5px;
      height: 66px;
      background: linear-gradient(to bottom, rgba(179,179,179,0) 0%, rgba(179,179,179,0.5) 22%, #b3b3b3 40%);
      transform: translateX(-0.75px);
    }
    .shelf-lamp .lamp-pull .lamp-pull-knob {
      position: absolute;
      top: 62px;
      left: 50%;
      margin-left: -6px;
      width: 12px;
      height: 12px;
      background: #d4d4d4;
      border: 1px solid #888;
      border-radius: 50%;
    }
    .shelf-lamp .lamp-pull-off { display: none; }
    .shelf-lamp .lamp-light {
      position: absolute;
      top: 65px;
      left: 50%;
      margin-left: -180px;
      width: 360px;
      height: 440px;
      background: radial-gradient(
        ellipse 45% 95% at 50% 0%,
        rgba(255, 220, 140, 0.55) 0%,
        rgba(255, 212, 132, 0.32) 32%,
        rgba(255, 208, 128, 0.14) 60%,
        rgba(255, 204, 124, 0.04) 82%,
        rgba(255, 200, 120, 0) 100%
      );
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 480ms ease;
      filter: blur(22px);
    }
    .shelf-lamp .lamp-ambient {
      position: absolute;
      top: 56px;
      left: 50%;
      margin-left: -110px;
      width: 220px;
      height: 220px;
      background: radial-gradient(
        circle at 50% 25%,
        rgba(255, 215, 135, 0.35) 0%,
        rgba(255, 210, 130, 0.12) 55%,
        rgba(255, 205, 125, 0) 100%
      );
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 500ms ease;
      filter: blur(14px);
    }
    #shelf-lamp:target .lamp-pull-on { display: none; }
    #shelf-lamp:target .lamp-pull-off { display: block; }
    #shelf-lamp:target .lamp-bulb {
      background: radial-gradient(circle at 40% 38%, #ffffff 0%, #FFF6C2 55%, #F5D76E 100%);
      box-shadow:
        0 0 6px 1px #ffffff,
        0 0 16px 4px rgba(255, 240, 170, 0.95),
        0 0 34px 10px rgba(255, 205, 80, 0.55);
    }
    #shelf-lamp:target .lamp-light { opacity: 1; }
    #shelf-lamp:target .lamp-ambient { opacity: 1; }
    #shelf-lamp:target ~ #bookshelf .book {
      transition: filter 400ms ease;
      filter: brightness(1.1) saturate(1.1);
    }

    #bookshelf-section .bookshelf-wrap {
      position: relative;
      margin-top: var(--space-2);
      max-width: 560px;
      perspective: 1400px;
    }
    #bookshelf-section .shelf-row { margin-bottom: 18px; }
    #bookshelf-section .shelf-row:last-child { margin-bottom: 0; }
    #bookshelf-section .bookshelf {
      display: flex;
      align-items: flex-end;
      flex-wrap: nowrap;
      gap: 0;
      padding: 16px 0 0;
    }
    #bookshelf-section .shelf-plank {
      height: 4px;
      background: var(--shelf-plank);
      border-radius: 1px;
      box-shadow: 0 1px 2px var(--book-shadow);
      margin-top: -1px;
    }
    #bookshelf-section .book {
      --book-bg: var(--book-rest-bg);
      --book-fg: var(--book-rest-fg);
      --book-edge: var(--border-soft);
      --own-tilt: 0deg;
      position: relative;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 7px 2px 10px;
      border: 1px solid var(--book-border);
      border-radius: 2px 2px 1px 1px;
      transform: rotate(var(--own-tilt));
      transform-origin: bottom center;
      transition:
        transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.28s ease,
        background 0.26s ease,
        border-color 0.26s ease,
        color 0.26s ease;
      cursor: default;
      font-family: var(--sans);
      user-select: none;
      will-change: transform;
      color: var(--book-fg);
      background: var(--book-bg);
      box-shadow: 0 1px 2px var(--book-shadow);
    }
    #bookshelf-section .book.cloth {
      --book-border: var(--book-border-cloth);
      --book-shadow: var(--book-shadow-cloth);
    }
    #bookshelf-section .book .title {
      writing-mode: vertical-rl;
      font-size: var(--book-font, 0.62rem);
      font-weight: var(--book-weight, 600);
      letter-spacing: var(--book-tracking, 0.07em);
      text-transform: uppercase;
      text-orientation: mixed;
      line-height: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 0;
      opacity: 0.88;
    }
    #bookshelf-section .book .icon {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      opacity: 0.9;
    }
    #bookshelf-section .book .icon img { width: 100%; height: 100%; display: block; }
    #bookshelf-section .book .icon .fallback {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: var(--book-fg);
      color: var(--book-bg);
      font-family: var(--mono);
      font-size: 7px;
      font-weight: 600;
      letter-spacing: 0.01em;
      border-radius: 1px;
      line-height: 1;
    }
    #bookshelf-section .book .foot {
      width: 60%; height: 2px;
      background: var(--book-fg);
      opacity: 0.16;
      border-radius: 1px;
      margin-top: 2px;
    }
    #bookshelf-section .book:hover {
      --book-bg: var(--book-brand);
      --book-fg: var(--book-contrast);
      --book-border: var(--book-border-hover);
      transform: translateY(-12px) scale(1.04) rotate(0deg) !important;
      z-index: 10;
      box-shadow: 0 8px 18px var(--book-shadow-hover);
    }
    #bookshelf-section .book:hover .title,
    #bookshelf-section .book:hover .icon { opacity: 1; }
    #bookshelf-section .book:hover .foot { opacity: 0.5; }
    #bookshelf-section .book.lean-left {
      transform: rotate(calc(var(--own-tilt) - 2.5deg));
    }
    #bookshelf-section .book.lean-right {
      transform: rotate(calc(var(--own-tilt) + 2.5deg));
    }

    /* Shared list + item styles */
    .bio-section-list { list-style: none; }
    .bio-section-list .item-title { margin-bottom: var(--space-2); }
    .bio-section-list .item-title a {
      color: var(--black); text-decoration: none;
      border-bottom: 1px solid transparent; transition: border-color 0.15s;
    }
    .bio-section-list .item-title a:hover { border-bottom-color: var(--black); }
    .bio-section-list .item-meta { margin-bottom: var(--space-2); }
    .bio-section-list .item-desc { font-size: 0.95rem; line-height: 1.6; color: var(--fg-muted); }
    .bio-section-list .item-title-row {
      display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-2);
    }
    .bio-section-list .item-title-row .item-title { margin-bottom: 0; flex: 1; }
    .bio-section-list .item-toggle {
      flex-shrink: 0; width: 24px; height: 24px; padding: 0; border: none;
      background: none; cursor: pointer; color: var(--gray);
      display: inline-flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease, color 0.15s;
    }
    .bio-section-list .item-toggle:hover { color: var(--black); }
    .bio-section-list .item-toggle.open { transform: rotate(90deg); }
    .bio-section-list .item-toggle svg { width: 14px; height: 14px; }
    .bio-section-list .item-desc.article-excerpt { margin-top: var(--space-3); display: none; }
    .bio-section-list .item-desc.article-excerpt.open { display: block; }
    .bio-section-list .item-skills { font-size: 0.85rem; color: var(--gray); margin-top: var(--space-3); }

    .show-more-btn {
      background: none; border: none; font-family: var(--sans);
      font-size: 0.82rem; font-weight: 500; color: var(--gray);
      cursor: pointer; padding: var(--space-3) 0; margin-top: var(--space-4);
      text-decoration: underline; text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .show-more-btn:hover { color: var(--black); }
    .show-more-btn.hidden { display: none; }

    .bio-links {
      display: flex; gap: var(--space-3); flex-wrap: wrap;
      margin-top: var(--space-10); padding-bottom: var(--space-2);
      align-items: center;
    }
    .btn {
      display: inline-flex; align-items: center;
      padding: 9px 20px; border-radius: 980px;
      font-size: 0.78rem; font-weight: 500;
      text-decoration: none; letter-spacing: 0.01em;
      transition: all 0.18s;
      border: none;
    }
    .btn-dark { background: var(--black); color: var(--white); }
    .btn-dark:hover { background: var(--btn-dark-hover); }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--white); color: var(--black);
      border: 1.5px solid var(--black);
      text-decoration: none; transition: all 0.18s;
    }
    .icon-btn:hover { background: var(--black); color: var(--white); }
    .icon-btn svg { width: 16px; height: 16px; display: block; }

    /* RIGHT — neural net */

      justify-content: center;

    @media (max-width: 720px) {
      html, body { overflow: auto; height: auto; }

        flex-direction: column;
        overflow: visible;
      }
      #right { display: none; }
      #left {
        order: 0;

      }

      #terminal-wrap {

      }
      #terminal {

      }
      #terminal-wrap.hide {

        height: 0;
        overflow: hidden;
        padding: 0;
      }
      #bio-wrap {
        position: absolute;
        height: 0;
        overflow: hidden;
        pointer-events: none;
      }
      #bio-wrap.show {
        position: relative;
        height: auto;
        overflow: visible;
        pointer-events: auto;
        scroll-snap-type: none;
      }
      .bio-intro, .bio-section { min-height: 0; }

<script>
/* ══════════════════════════
   TERMINAL
══════════════════════════ */
(function () {
  const SESSION_KEY = 'ryanrana_intro_done';

  const LINES = [
    { id: 'tl0', text: '>>> curl -s -o /tmp/ryan.json -w "%{http_code}"', cls: '' },
    { id: 'tl1', text: '200 OK', cls: 't-ok' },
    { id: 'tl2', text: ">>> jq -r '\"\\(.name) \\(.superpower)\"'", cls: '' },
    { id: 'tl3', text: 'ryan rana, building', cls: 't-gray' },
    { id: 'tl4', text: '>>> cat bio.txt', cls: '' },
    { id: 'tl5', text: '', cls: '' },
  ];

  let step = 0;
  let typing = false;
  let revealed = false;

  const cur = document.createElement('span');
  cur.className = 'cursor';

  function typeLine(el, text, cls, cb) {
    if (cls) el.className = 't-line ' + cls;
    if (cur.parentNode) cur.parentNode.removeChild(cur);
    el.appendChild(cur);
    if (!text) { cb && cb(); return; }
    let i = 0;
    const iv = setInterval(() => {
      cur.before(document.createTextNode(text[i++]));
      if (i >= text.length) { clearInterval(iv); cb && cb(); }
    }, 24);
  }

  function runSequence(resultIdx, nextPromptIdx, then) {
    const result = LINES[resultIdx];
    const resultEl = document.getElementById(result.id);
    typeLine(resultEl, result.text, result.cls, () => {
      if (nextPromptIdx == null) { then && then(); return; }
      const next = LINES[nextPromptIdx];
      typeLine(document.getElementById(next.id), next.text, next.cls, () => { typing = false; then && then(); });
    });
  }

  function hideSkip() {
    const s = document.getElementById('t-skip');
    if (s) s.classList.add('hide');
  }

  function advance() {
    if (typing || revealed) return;
    hideSkip();
    typing = true;
    if (window.__nnRearrange) window.__nnRearrange();

    if (step === 0) {
      // Show 200 OK, then type second line (print name/superpower)
      runSequence(1, 2, () => { step = 1; });
    } else if (step === 1) {
      // Show print output, then type third line (print bio.txt)
      runSequence(3, 4, () => { step = 2; });
    } else {
      // Reveal everything (skip typing bio result)
      typing = false;
      reveal();
    }
  }

  function reveal() {
    if (revealed) return;
    revealed = true;
    try { sessionStorage.setItem(SESSION_KEY, '1'); } catch (_) {}
    if (cur.parentNode) cur.parentNode.removeChild(cur);
    document.getElementById('terminal-wrap').classList.add('hide');
    setTimeout(function () {
      document.getElementById('nav').classList.add('show');
      document.getElementById('bio-wrap').classList.add('show');
    }, 260);
  }

  // Skip terminal if user already completed intro this session
  try {
    if (sessionStorage.getItem(SESSION_KEY)) {
      reveal();
      return;
    }
  } catch (_) {}

  // Type first prompt on load; show Enter + Skip hint when ready
  setTimeout(function () {
    typing = true;
    typeLine(document.getElementById('tl0'), LINES[0].text, LINES[0].cls, function () {
      typing = false;
      var hint = document.getElementById('t-hint');
      if (hint) hint.style.opacity = '1';
    });
  }, 400);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter') {
      e.preventDefault();
      if (revealed) { if (window.__nnRearrange) window.__nnRearrange(); }
      else advance();
    }
    if (e.code === 'Space') { e.preventDefault(); if (window.__nnRearrange) window.__nnRearrange(); }
  });
  document.getElementById('left').addEventListener('click', () => {
    if (!typing) advance();
  });
  const skipBtn = document.getElementById('t-skip');
  if (skipBtn) {
    skipBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (revealed) return;
      hideSkip();
      reveal();
    });
  }
})();

(function () {
  const icon = document.getElementById('github-icon');
  const sound = document.getElementById('github-push-sound');
  if (!icon || !sound) return;
  icon.addEventListener('click', () => {
    try {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    } catch (e) {}
  });
})();

/* Bio — load from data/bio.json and render name + paragraphs + refs */
(function () {
  const codeStyle = 'font-size:0.88em;letter-spacing:-0.02em';
  function esc(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  function renderPart(part, refs) {
    if (part.text) return [document.createTextNode(part.text)];
    if (part.code) {
      var code = document.createElement('code');
      code.style.cssText = codeStyle;
      code.textContent = part.code;
      return [code];
    }
    if (part.link) {

/* Articles, Experience, Projects — load JSON, show 5 at a time */
(function () {
  const PAGE = 5;

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function parseYear(dateStr) {
    if (!dateStr) return 0;
    const m = dateStr.match(/\b(19|20)\d{2}\b/);
    return m ? parseInt(m[0], 10) : 0;
  }

  function renderArticleItem(item, list) {
    const hasExcerpt = item.excerpt && item.excerpt.length > 0;
    const titleRow = '<div class="item-title-row">' +
      '<div class="item-title"><a href="' + (item.url || '#') + '" target="_blank" rel="noopener">' + escapeHtml(item.title) + '</a></div>' +
      (hasExcerpt ? '<button type="button" class="item-toggle" aria-label="Show excerpt"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>' : '') +
      '</div>';
    const meta = item.date ? '<div class="item-meta">' + escapeHtml(item.date) + '</div>' : '';
    const excerptDiv = hasExcerpt ? '<div class="item-desc article-excerpt">' + escapeHtml(item.excerpt) + '</div>' : '';
    const li = document.createElement('li');
    li.innerHTML = titleRow + meta + excerptDiv;
    if (hasExcerpt) {
      const toggle = li.querySelector('.item-toggle');
      const excerpt = li.querySelector('.article-excerpt');
      toggle.addEventListener('click', function () {
        toggle.classList.toggle('open');
        excerpt.classList.toggle('open');
      });
    }
    list.appendChild(li);
  }

  function setupSection(listId, moreBtnId, data) {
    const list = document.getElementById(listId);
    const btn = document.getElementById(moreBtnId);
    if (!list || !btn || !data || !data.length) {
      if (btn) btn.classList.add('hidden');
      return;
    }
    var sortedData = data.slice();
    if (listId === 'articles-list') {
      sortedData.sort(function (a, b) { return parseYear(b.date) - parseYear(a.date) || 0; });
    }
    var shown = Math.min(PAGE, sortedData.length);
    function update() {
      var toShow = sortedData.slice(0, shown);
      list.innerHTML = '';
      if (listId === 'articles-list') {
        var byYear = {};
        toShow.forEach(function (item) {
          var y = parseYear(item.date) || 'Other';
          if (!byYear[y]) byYear[y] = [];
          byYear[y].push(item);
        });
        var years = Object.keys(byYear).sort(function (a, b) { return Number(b) - Number(a); });
        years.forEach(function (year) {
          var yearEl = document.createElement('div');
          yearEl.className = 'articles-year';
          yearEl.textContent = year;
          list.appendChild(yearEl);
          byYear[year].forEach(function (item) { renderArticleItem(item, list); });
        });
      } else {
        toShow.forEach(function (item) {
          var li = document.createElement('li');
          if (listId === 'experience-list') {
            var meta = [item.company, item.date].filter(Boolean).join(' · ');
            li.innerHTML = '<div class="item-title">' + escapeHtml(item.title) + '</div>' +
              (meta ? '<div class="item-meta">' + escapeHtml(meta) + '</div>' : '') +
              (item.description ? '<div class="item-desc">' + escapeHtml(item.description) + '</div>' : '');
          } else {
            var skillsHtml = '';
            if (item.skills && item.skills.length) {
              skillsHtml = '<div class="item-skills">' + item.skills.map(function (s) {
                return '<span class="project-skill">' + escapeHtml(s) + '</span>';
              }).join('') + '</div>';
            }
            var sep = item.description ? ' <span class="project-sep">—</span> ' : '';
            li.innerHTML = '<span class="item-title"><a href="' + (item.url || '#') + '" target="_blank" rel="noopener">' + escapeHtml(item.title) + '</a></span>' +
              (item.description ? sep + '<span class="item-desc">' + escapeHtml(item.description) + '</span>' : '') + (skillsHtml ? ' ' + skillsHtml : '');
          }
          list.appendChild(li);
        });
      }
      if (shown >= sortedData.length) btn.classList.add('hidden');
      else { btn.classList.remove('hidden'); btn.textContent = 'Show more'; }
    }
    btn.addEventListener('click', function () {
      shown = Math.min(shown + PAGE, sortedData.length);
      update();
    });
    update();
  }

  const DATA_DIR = 'data/';
  function loadJson(path) {
    return fetch(DATA_DIR + path + '?t=' + Date.now()).then(function (r) { return r.ok ? r.json() : []; }).catch(function () { return []; });
  }
  Promise.all([
    loadJson('articles.json'),
    loadJson('experience.json'),
    loadJson('projects.json')
  ]).then(function (results) {
    var articles = Array.isArray(results[0]) ? results[0] : [];
    var experience = Array.isArray(results[1]) ? results[1] : [];
    var projects = Array.isArray(results[2]) ? results[2] : [];
    setupSection('articles-list', 'articles-more', articles);
    setupSection('experience-list', 'experience-more', experience);
    setupSection('projects-list', 'projects-more', projects);
  });
})();

  function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function contrastFg(hex) {

    var leanRight = tiltBase > 0 ? topShift : 0;

  function build() {

    function pairGap(a, b) {
      return Math.ceil(Math.max(0, a._leanR + b._leanL));

      var isLast = i === els.length - 1;

        flushRow();
        row = document.createElement('div');

        rowW = 0;
        prevInRow = null;
      }
    });

  }

  function applyLampDip() {
    var pull = document.querySelector('#shelf-lamp .lamp-pull-on');
    var firstBookshelf = wrap.querySelector('.shelf-row:first-child .bookshelf');
    if (!pull || !firstBookshelf) return;
    var pullRect = pull.getBoundingClientRect();
    var chainX = pullRect.left + pullRect.width / 2;
    var DIP_RADIUS = 170;
    var MAX_DIP = 58;
    firstBookshelf.querySelectorAll('.book').forEach(function (b) {
      var r = b.getBoundingClientRect();
      var cx = r.left + r.width / 2;
      var dx = Math.abs(cx - chainX);
      if (dx >= DIP_RADIUS) return;
      var t = dx / DIP_RADIUS;
      var factor = 0.5 * (1 + Math.cos(Math.PI * t));
      var reduce = MAX_DIP * factor;
      var currentH = parseFloat(b.style.height) || b.offsetHeight;
      var newH = Math.max(70, currentH - reduce);
      b.style.height = newH + 'px';
    });
  }

  build();
  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(build, 200);
  });
})();

(function () {
  const wrap   = document.getElementById('nn-wrap');
  const canvas = document.getElementById('nn-canvas');
  const ctx    = canvas.getContext('2d');
  const rootStyle = getComputedStyle(document.documentElement);
  const nnFg       = () => (rootStyle.getPropertyValue('--nn-fg-rgb').trim() || '0,0,0');
  const nnNodeFill = () => (rootStyle.getPropertyValue('--nn-node-fill').trim() || '#fff');

  let W = 0, H = 0;
  const mouse = { x: -999, y: -999 };

  const PULL = 0.7, SPRING = 0.14, DRAG = 0.78, MAX_SPD = 22, FADE_MS = 440;

  function getConfig(width) {
    if (width < 520)  return { N: 50,  R: 4.2, MOUSE_R: 220, kMin: 3, kMax: 5, minDeg: 3 };
    if (width < 900)  return { N: 90,  R: 4.0, MOUSE_R: 280, kMin: 3, kMax: 5, minDeg: 3 };
    if (width < 1400) return { N: 140, R: 3.8, MOUSE_R: 340, kMin: 4, kMax: 6, minDeg: 3 };
    if (width < 2000) return { N: 190, R: 3.6, MOUSE_R: 400, kMin: 4, kMax: 6, minDeg: 3 };
    return              { N: 240, R: 3.4, MOUSE_R: 460, kMin: 4, kMax: 7, minDeg: 3 };
  }

  let config = getConfig(400);
  let nodes = [];
  let targets = [];
  let prevEdges = [], nextEdges = [];
  let adjacency = [];
  let fade = 1;
  let pulses = [];
  let spawnT = 0;

  function buildAdjacency(edg, N) {
    const adj = Array(N).fill(null).map(() => []);
    for (const e of edg) {
      adj[e.from].push(e.to);
      adj[e.to].push(e.from);
    }
    return adj;
  }

  function newPulse(from, to) {
    return {
      from, to, p: 0,
      speed: 0.75 + Math.random() * 0.85,
      hops: 0,
      maxHops: 5 + Math.floor(Math.random() * 6)
    };
  }

  const LAYOUTS = [
    'rings', 'hex', 'spiral', 'wheel',
    'grid', 'lissajous', 'figure8', 'rose',
    'sunburst', 'waves', 'polygon',
    'dna', 'gear', 'cardioid',
    'phyllotaxis', 'layers', 'tree'
  ];
  let lastLayout = null;

  function randLayout() {
    const N = config.N;
    const cx = W / 2, cy = H / 2;
    const base = Math.min(W, H);
    const mX = W * 0.06, mY = H * 0.05;
    const maxX = W - mX, maxY = H - mY;
    const clamp = (p) => ({
      x: Math.max(mX, Math.min(maxX, p.x)),
      y: Math.max(mY, Math.min(maxY, p.y))
    });

    const choices = LAYOUTS.filter(l => l !== lastLayout);
    const kind = choices[Math.floor(Math.random() * choices.length)];
    lastLayout = kind;

    const pos = [];

    if (kind === 'rings') {
      const rings = 3 + Math.floor(Math.random() * 3);
      const rMin = base * 0.08, rMax = base * 0.42;
      const radii = [];
      for (let r = 0; r < rings; r++) {
        radii.push(rMin + (r / Math.max(1, rings - 1)) * (rMax - rMin));
      }
      let weightSum = 0;
      for (let r = 0; r < rings; r++) weightSum += (r + 2);
      const counts = [];
      let placed = 0;
      for (let r = 0; r < rings; r++) {
        const c = r === rings - 1 ? N - placed : Math.round(N * (r + 2) / weightSum);
        counts.push(c); placed += c;
      }
      for (let r = 0; r < rings; r++) {
        const off = Math.random() * Math.PI * 2;
        const step = (Math.PI * 2) / counts[r];
        for (let i = 0; i < counts[r]; i++) {
          const a = off + i * step;
          pos.push(clamp({ x: cx + Math.cos(a) * radii[r], y: cy + Math.sin(a) * radii[r] }));
        }
      }
    } else if (kind === 'wheel') {
      const spokes = 6 + Math.floor(Math.random() * 4);
      const layers = Math.max(2, Math.ceil((N - 1) / spokes));
      const step = base * 0.38 / layers;
      const off = Math.random() * Math.PI * 2;
      pos.push(clamp({ x: cx, y: cy }));
      for (let L = 1; L <= layers && pos.length < N; L++) {
        const rr = L * step;
        const twist = (L % 2 === 0) ? Math.PI / spokes : 0;
        for (let s = 0; s < spokes && pos.length < N; s++) {
          const a = off + twist + (s / spokes) * Math.PI * 2;
          pos.push(clamp({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr }));
        }
      }
    } else if (kind === 'hex') {
      const ratio = W / H;
      const cols = Math.max(4, Math.round(Math.sqrt(N * ratio) * 1.05));
      const rows = Math.ceil(N / cols);
      const sx = (maxX - mX) / cols;
      const sy = (maxY - mY) / Math.max(1, rows);
      let k = 0;
      for (let r = 0; r < rows && k < N; r++) {
        const rowCount = (r === rows - 1) ? (N - r * cols) : cols;
        const rowOff = (r % 2) * sx * 0.5;
        const startX = mX + sx * 0.5 + rowOff;
        const yy = mY + sy * 0.5 + r * sy;
        for (let c = 0; c < rowCount && k < N; c++) {
          pos.push(clamp({ x: startX + c * sx, y: yy }));
          k++;
        }
      }
    } else if (kind === 'grid') {
      const ratio = W / H;
      const cols = Math.max(4, Math.round(Math.sqrt(N * ratio)));
      const rows = Math.ceil(N / cols);
      const sx = (maxX - mX) / cols;
      const sy = (maxY - mY) / Math.max(1, rows);
      let k = 0;
      for (let r = 0; r < rows && k < N; r++) {
        for (let c = 0; c < cols && k < N; c++) {
          pos.push(clamp({ x: mX + sx * 0.5 + c * sx, y: mY + sy * 0.5 + r * sy }));
          k++;
        }
      }
    } else if (kind === 'spiral') {
      const turns = 3 + Math.random() * 2;
      const maxR = base * 0.42;
      const off = Math.random() * Math.PI * 2;
      const dir = Math.random() < 0.5 ? 1 : -1;
      for (let i = 0; i < N; i++) {
        const t = (i + 0.5) / N;
        const a = off + dir * t * turns * Math.PI * 2;
        const r = maxR * Math.sqrt(t);
        pos.push(clamp({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r }));
      }
    } else if (kind === 'phyllotaxis') {
      const golden = Math.PI * (3 - Math.sqrt(5));
      const scale = base * 0.032;
      const off = Math.random() * Math.PI * 2;
      for (let i = 0; i < N; i++) {
        const r = scale * Math.sqrt(i + 0.5);
        const a = i * golden + off;
        pos.push(clamp({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }));
      }
    } else if (kind === 'layers') {
      const L = 4 + Math.floor(Math.random() * 2);
      const shapes = ['bottleneck', 'pyramid', 'expand'];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const weights = [];
      for (let i = 0; i < L; i++) {
        const t = i / (L - 1);
        let w;
        if (shape === 'bottleneck') w = 0.4 + Math.abs(t - 0.5) * 1.4;
        else if (shape === 'pyramid') w = 1.2 - t * 0.8;
        else w = 0.4 + t * 1.0;
        weights.push(w);
      }
      const wSum = weights.reduce((a, b) => a + b, 0);
      const counts = weights.map(w => Math.max(2, Math.round(N * w / wSum)));
      let diff = N - counts.reduce((a, b) => a + b, 0);
      for (let i = 0; diff !== 0 && i < 50; i++) {
        const idx = Math.floor(Math.random() * L);
        if (diff > 0) { counts[idx]++; diff--; }
        else if (counts[idx] > 2) { counts[idx]--; diff++; }
      }
      const colW = (maxX - mX) / (L + 1);
      let k = 0;
      for (let col = 0; col < L && k < N; col++) {
        const x = mX + colW * (col + 1);
        const cnt = counts[col];
        const h = (maxY - mY) * 0.9;
        const y0 = cy - h / 2;
        for (let i = 0; i < cnt && k < N; i++) {
          const t = cnt === 1 ? 0.5 : i / (cnt - 1);
          pos.push(clamp({ x, y: y0 + t * h }));
          k++;
        }
      }
    } else if (kind === 'tree') {
      const counts = [];
      let placed = 0;
      let L = 0;
      while (placed < N && L < 8) {
        const cnt = Math.min(Math.pow(2, L), N - placed);
        counts.push(cnt);
        placed += cnt;
        L++;
      }
      if (placed < N) counts[counts.length - 1] += N - placed;
      const rows = counts.length;
      const rowH = (maxY - mY) / (rows + 1);
      let k = 0;
      for (let r = 0; r < rows && k < N; r++) {
        const y = mY + rowH * (r + 1);
        const cnt = counts[r];
        const jitter = r === 0 ? 0 : (maxX - mX) * 0.04;
        for (let i = 0; i < cnt && k < N; i++) {
          const t = cnt === 1 ? 0.5 : i / (cnt - 1);
          const spread = 0.1 + r * (0.8 / Math.max(1, rows - 1));
          const x = cx - (maxX - mX) * spread / 2 + t * (maxX - mX) * spread;
          const jx = (Math.random() - 0.5) * jitter;
          pos.push(clamp({ x: x + jx, y }));
          k++;
        }
      }
    } else if (kind === 'lissajous') {
      const a = 2 + Math.floor(Math.random() * 3);
      const b = a + 1;
      const delta = Math.PI / 2;
      const amp = base * 0.4;
      const layers = 3;
      const perLayer = Math.ceil(N / layers);
      let k = 0;
      for (let L = 0; L < layers && k < N; L++) {
        const s = 1 - L * 0.3;
        const cnt = L === layers - 1 ? N - k : perLayer;
        const phase = L * 0.22;
        for (let i = 0; i < cnt && k < N; i++) {
          const t = (i / cnt) * Math.PI * 2 + phase;
          pos.push(clamp({ x: cx + amp * s * Math.sin(a * t + delta), y: cy + amp * s * Math.sin(b * t) }));
          k++;
        }
      }
    } else if (kind === 'figure8') {
      const amp = base * 0.42;
      const baseOff = Math.random() * Math.PI * 2;
      const layers = 3;
      const perLayer = Math.ceil(N / layers);
      let k = 0;
      for (let L = 0; L < layers && k < N; L++) {
        const s = 1 - L * 0.3;
        const cnt = L === layers - 1 ? N - k : perLayer;
        const off = baseOff + L * 0.2;
        for (let i = 0; i < cnt && k < N; i++) {
          const t = (i / cnt) * Math.PI * 2 + off;
          const sv = Math.sin(t), cv = Math.cos(t);
          pos.push(clamp({ x: cx + amp * s * cv, y: cy + amp * s * 1.4 * sv * cv }));
          k++;
        }
      }
    } else if (kind === 'rose') {
      const kk = 2 + Math.floor(Math.random() * 4);
      const amp = base * 0.4;
      const baseOff = Math.random() * Math.PI * 2;
      const layers = 3;
      const perLayer = Math.ceil(N / layers);
      let k = 0;
      for (let L = 0; L < layers && k < N; L++) {
        const s = 1 - L * 0.3;
        const cnt = L === layers - 1 ? N - k : perLayer;
        const off = baseOff + L * 0.15;
        for (let i = 0; i < cnt && k < N; i++) {
          const t = (i / cnt) * Math.PI * 2 + off;
          const r = amp * s * Math.abs(Math.cos(kk * t));
          pos.push(clamp({ x: cx + r * Math.cos(t), y: cy + r * Math.sin(t) }));
          k++;
        }
      }
    } else if (kind === 'sunburst') {
      const rays = 8 + Math.floor(Math.random() * 5);
      const maxR = base * 0.42;
      const off = Math.random() * Math.PI * 2;
      const perRay = Math.ceil(N / rays);
      let k = 0;
      for (let r = 0; r < rays && k < N; r++) {
        const a = off + (r / rays) * Math.PI * 2;
        for (let p = 0; p < perRay && k < N; p++) {
          const rr = maxR * ((p + 1) / perRay);
          pos.push(clamp({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr }));
          k++;
        }
      }
    } else if (kind === 'waves') {
      const rows = 4 + Math.floor(Math.random() * 3);
      const perRow = Math.ceil(N / rows);
      const rowSpacing = (maxY - mY) / (rows + 1);
      const freq = 2 + Math.random() * 2;
      const amp = rowSpacing * 0.4;
      let k = 0;
      for (let r = 0; r < rows && k < N; r++) {
        const y0 = mY + (r + 1) * rowSpacing;
        const phase = Math.random() * Math.PI * 2;
        for (let i = 0; i < perRow && k < N; i++) {
          const tt = i / Math.max(1, perRow - 1);
          const x = mX + tt * (maxX - mX);
          const y = y0 + Math.sin(tt * freq * Math.PI * 2 + phase) * amp;
          pos.push(clamp({ x, y }));
          k++;
        }
      }
    } else if (kind === 'polygon') {
      const sides = 5 + Math.floor(Math.random() * 4);
      const outerR = base * 0.4;
      const outlineN = Math.max(sides * 3, Math.floor(N * 0.55));
      const interiorN = N - outlineN;
      const off = Math.random() * Math.PI * 2 - Math.PI / 2;
      for (let i = 0; i < outlineN; i++) {
        const t = (i / outlineN) * sides;
        const seg = Math.floor(t) % sides;
        const segT = t - Math.floor(t);
        const a1 = off + (seg / sides) * Math.PI * 2;
        const a2 = off + ((seg + 1) / sides) * Math.PI * 2;
        const x1 = cx + Math.cos(a1) * outerR, y1 = cy + Math.sin(a1) * outerR;
        const x2 = cx + Math.cos(a2) * outerR, y2 = cy + Math.sin(a2) * outerR;
        pos.push(clamp({ x: x1 + (x2 - x1) * segT, y: y1 + (y2 - y1) * segT }));
      }
      const innerRings = Math.max(1, Math.min(3, Math.floor(interiorN / sides)));
      let leftInt = interiorN;
      for (let r = 0; r < innerRings; r++) {
        const cnt = r === innerRings - 1 ? leftInt : Math.round(interiorN / innerRings);
        leftInt -= cnt;
        const rr = outerR * (0.25 + r * 0.28);
        const ro = Math.random() * Math.PI * 2;
        for (let i = 0; i < cnt; i++) {
          const a = ro + (i / cnt) * Math.PI * 2;
          pos.push(clamp({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr }));
        }
      }
    } else if (kind === 'dna') {
      const half = Math.floor(N / 2);
      const other = N - half;
      const freq = 2.5 + Math.random() * 1.5;
      const amp = base * 0.16;
      for (let i = 0; i < half; i++) {
        const t = half === 1 ? 0.5 : i / (half - 1);
        const y = mY + t * (maxY - mY);
        const x = cx + Math.sin(t * freq * Math.PI * 2) * amp;
        pos.push(clamp({ x, y }));
      }
      for (let i = 0; i < other; i++) {
        const t = other === 1 ? 0.5 : i / (other - 1);
        const y = mY + t * (maxY - mY);
        const x = cx + Math.sin(t * freq * Math.PI * 2 + Math.PI) * amp;
        pos.push(clamp({ x, y }));
      }
    } else if (kind === 'gear') {
      const teeth = 10 + Math.floor(Math.random() * 6);
      const outerR = base * 0.4, innerR = outerR * 0.82;
      const segs = teeth * 2;
      const baseOff = Math.random() * Math.PI * 2;
      const layers = 3;
      const outlineN = Math.max(segs * 2, Math.floor(N * 0.55));
      let k = 0;
      for (let i = 0; i < outlineN && k < N; i++) {
        const t = (i / outlineN) * segs;
        const seg = Math.floor(t) % segs;
        const segT = t - Math.floor(t);
        const a1 = baseOff + (seg / segs) * Math.PI * 2;
        const a2 = baseOff + ((seg + 1) / segs) * Math.PI * 2;
        const r1 = seg % 2 === 0 ? outerR : innerR;
        const r2 = seg % 2 === 0 ? innerR : outerR;
        const x1 = cx + Math.cos(a1) * r1, y1 = cy + Math.sin(a1) * r1;
        const x2 = cx + Math.cos(a2) * r2, y2 = cy + Math.sin(a2) * r2;
        pos.push(clamp({ x: x1 + (x2 - x1) * segT, y: y1 + (y2 - y1) * segT }));
        k++;
      }
      const interiorN = N - k;
      if (interiorN > 0) {
        const innerLayers = Math.min(3, Math.max(1, Math.floor(interiorN / Math.max(1, teeth))));
        let leftInt = interiorN;
        for (let L = 0; L < innerLayers && k < N; L++) {
          const cnt = L === innerLayers - 1 ? leftInt : Math.round(interiorN / innerLayers);
          leftInt -= cnt;
          const rr = outerR * (0.55 - L * 0.18);
          const ro = Math.random() * Math.PI * 2;
          for (let i = 0; i < cnt && k < N; i++) {
            const a = ro + (i / cnt) * Math.PI * 2;
            pos.push(clamp({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr }));
            k++;
          }
        }
      }
    } else { // cardioid
      const amp = base * 0.22;
      const baseOff = Math.random() * Math.PI * 2;
      const layers = 4;
      const perLayer = Math.ceil(N / layers);
      let k = 0;
      for (let L = 0; L < layers && k < N; L++) {
        const s = 1 - L * 0.22;
        const cnt = L === layers - 1 ? N - k : perLayer;
        const off = baseOff + L * 0.18;
        for (let i = 0; i < cnt && k < N; i++) {
          const t = (i / cnt) * Math.PI * 2 + off;
          const r = amp * s * (1 - Math.cos(t));
          pos.push(clamp({ x: cx + r * Math.cos(t), y: cy + r * Math.sin(t) }));
          k++;
        }
      }
    }

    return pos;
  }

  function buildEdges(pos) {
    const N = pos.length;
    const edg = [];
    const seen = new Set();
    const deg = new Int32Array(N);
    const allDists = [];
    const kMin = config.kMin, kMax = config.kMax, minDeg = config.minDeg || 2;
    for (let i = 0; i < N; i++) {
      const dists = [];
      for (let j = 0; j < N; j++) {
        if (i === j) continue;
        const dx = pos[i].x - pos[j].x, dy = pos[i].y - pos[j].y;
        dists.push({ j, d: dx * dx + dy * dy });
      }
      dists.sort((a, b) => a.d - b.d);
      allDists.push(dists);
      const k = kMin + Math.floor(Math.random() * (kMax - kMin + 1));
      for (const { j } of dists.slice(0, k)) {
        const key = i < j ? i + '-' + j : j + '-' + i;
        if (seen.has(key)) continue;
        seen.add(key);
        edg.push({ from: i, to: j });
        deg[i]++; deg[j]++;
      }
    }
    for (let i = 0; i < N; i++) {
      let need = minDeg - deg[i];
      if (need <= 0) continue;
      for (const { j } of allDists[i]) {
        if (need <= 0) break;
        const key = i < j ? i + '-' + j : j + '-' + i;
        if (seen.has(key)) continue;
        seen.add(key);
        edg.push({ from: i, to: j });
        deg[i]++; deg[j]++;
        need--;
      }
    }
    ensureConnected(pos, edg, seen);
    return edg;
  }

  function ensureConnected(pos, edg, seen) {
    const N = pos.length;
    const parent = new Int32Array(N);
    for (let i = 0; i < N; i++) parent[i] = i;
    function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
    function union(a, b) { const ra = find(a), rb = find(b); if (ra !== rb) { parent[ra] = rb; return true; } return false; }
    for (const e of edg) union(e.from, e.to);
    const groups = new Map();
    for (let i = 0; i < N; i++) {
      const r = find(i);
      if (!groups.has(r)) groups.set(r, []);
      groups.get(r).push(i);
    }
    if (groups.size <= 1) return;
    let comps = [...groups.values()];
    while (comps.length > 1) {
      const main = comps[0];
      let bestD = Infinity, bestA = -1, bestB = -1, bestK = 1;
      for (let k = 1; k < comps.length; k++) {
        const other = comps[k];
        for (let ii = 0; ii < main.length; ii++) {
          const a = main[ii], pa = pos[a];
          for (let jj = 0; jj < other.length; jj++) {
            const b = other[jj], pb = pos[b];
            const dx = pa.x - pb.x, dy = pa.y - pb.y;
            const d = dx * dx + dy * dy;
            if (d < bestD) { bestD = d; bestA = a; bestB = b; bestK = k; }
          }
        }
      }
      const key = bestA < bestB ? bestA + '-' + bestB : bestB + '-' + bestA;
      if (!seen.has(key)) { seen.add(key); edg.push({ from: bestA, to: bestB }); }
      for (const n of comps[bestK]) main.push(n);
      comps.splice(bestK, 1);
    }
  }

  function apply(instant) {
    const pos = randLayout();
    const edg = buildEdges(pos);
    targets = pos;
    if (instant) {
      prevEdges = edg; nextEdges = edg; fade = 1;
    } else {
      prevEdges = nextEdges.length ? nextEdges : edg;
      nextEdges = edg; fade = 0;
    }
    adjacency = buildAdjacency(edg, config.N);
    pulses = [];
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    const next = getConfig(W);
    const sizeChanged = next.N !== config.N;
    config = next;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (sizeChanged || nodes.length !== config.N) {
      nodes = [];
      for (let i = 0; i < config.N; i++) {
        nodes.push({
          x: 0, y: 0, vx: 0, vy: 0,
          phx: Math.random() * Math.PI * 2,
          phy: Math.random() * Math.PI * 2,
          fx: 0.0005 + Math.random() * 0.0007,
          fy: 0.0005 + Math.random() * 0.0007,
          amp: 3 + Math.random() * 4
        });
      }
    }
    apply(true);
    for (let i = 0; i < config.N; i++) {
      nodes[i].x = targets[i].x;
      nodes[i].y = targets[i].y;
      nodes[i].vx = 0; nodes[i].vy = 0;
    }
  }

  let clock = 0;
  function tick(dt) {
    const N = config.N, R = config.MOUSE_R;
    if (fade < 1) fade = Math.min(1, fade + dt / FADE_MS);
    clock += dt;
    const dn = Math.min(dt / 16, 2);
    for (let i = 0; i < N; i++) {
      const n = nodes[i], t = targets[i];
      const tx = t.x + Math.sin(clock * n.fx + n.phx) * n.amp;
      const ty = t.y + Math.cos(clock * n.fy + n.phy) * n.amp;
      n.vx += (tx - n.x) * SPRING * dn;
      n.vy += (ty - n.y) * SPRING * dn;
      const dx = mouse.x - n.x, dy = mouse.y - n.y;
      const d  = Math.hypot(dx, dy) || 0.001;
      if (d < R) {
        const f = PULL * (1 - d / R) * dn;
        n.vx += dx / d * f; n.vy += dy / d * f;
      }
      n.vx *= DRAG; n.vy *= DRAG;
      const spd = Math.hypot(n.vx, n.vy);
      if (spd > MAX_SPD) { n.vx = n.vx/spd*MAX_SPD; n.vy = n.vy/spd*MAX_SPD; }
      n.x += n.vx; n.y += n.vy;
    }

    const edgeList = nextEdges;
    const maxPulses = Math.max(14, Math.floor(N * 0.18));
    spawnT += dt;
    const spawnEvery = Math.max(90, 280 - N);
    while (spawnT > spawnEvery) {
      spawnT -= spawnEvery;
      if (edgeList.length && pulses.length < maxPulses) {
        const e = edgeList[Math.floor(Math.random() * edgeList.length)];
        pulses.push(newPulse(e.from, e.to));
      }
    }
    for (let i = pulses.length - 1; i >= 0; i--) {
      const p = pulses[i];
      p.p += (dt / 620) * p.speed;
      let alive = true;
      while (alive && p.p >= 1) {
        p.hops++;
        if (p.hops >= p.maxHops) { alive = false; break; }
        const neigh = adjacency[p.to];
        if (!neigh || !neigh.length) { alive = false; break; }
        const opts = neigh.length > 1 ? neigh.filter(n => n !== p.from) : neigh;
        const pool = opts.length ? opts : neigh;
        const overflow = p.p - 1;
        p.from = p.to;
        p.to = pool[Math.floor(Math.random() * pool.length)];
        p.p = overflow;
        p.speed = 0.75 + Math.random() * 0.85;
      }
      if (!alive) pulses.splice(i, 1);
    }
  }

  function drawPulses() {
    const N = config.N;
    const pr = N <= 60 ? 3.0 : N <= 110 ? 2.8 : N <= 170 ? 2.5 : 2.2;
    for (const pu of pulses) {
      const a = nodes[pu.from], b = nodes[pu.to];
      if (!a || !b) continue;
      const x = a.x + (b.x - a.x) * pu.p;
      const y = a.y + (b.y - a.y) * pu.p;
      let al = 0.9;
      if (pu.hops === 0) al *= Math.min(1, pu.p * 3.5);
      if (pu.hops === pu.maxHops - 1) al *= Math.pow(1 - pu.p, 1.4);
      ctx.fillStyle = `rgba(${nnFg()},${al.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(x, y, pr, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEdges(list, alpha) {
    if (!alpha || !list.length) return;
    const N = config.N;
    const lineW = N <= 50 ? 1.7 : N <= 100 ? 1.5 : N <= 170 ? 1.3 : 1.15;
    const baseAlpha = N <= 50 ? 0.48 : N <= 100 ? 0.4 : N <= 170 ? 0.34 : 0.3;
    ctx.strokeStyle = `rgba(${nnFg()},${(alpha * baseAlpha).toFixed(3)})`;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    for (const e of list) {
      const a = nodes[e.from], b = nodes[e.to];
      if (!a || !b) continue;
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
    }
    ctx.stroke();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    if (fade >= 1) {
      drawEdges(nextEdges, 1);
    } else {
      const prevA = fade < 0.5 ? 1 - fade * 2 : 0;
      const nextA = fade < 0.5 ? 0 : (fade - 0.5) * 2;
      drawEdges(prevEdges, prevA);
      drawEdges(nextEdges, nextA);
    }
    drawPulses();
    ctx.fillStyle = nnNodeFill();
    ctx.strokeStyle = `rgba(${nnFg()},0.85)`;
    ctx.lineWidth = 1;
    const R = config.R;
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, R, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
  }

  let last = performance.now();
  function loop(now) {
    tick(Math.min(50, now - last));
    last = now;
    render();
    requestAnimationFrame(loop);
  }

  function updateMouseFromEvent(e) {
    const r = canvas.getBoundingClientRect();
    if (!r.width || !r.height) return;
    const x = e.clientX - r.left, y = e.clientY - r.top;
    if (x >= 0 && x <= r.width && y >= 0 && y <= r.height) {
      mouse.x = x * (W / r.width);
      mouse.y = y * (H / r.height);
    } else {
      mouse.x = -999; mouse.y = -999;
    }
  }
  canvas.addEventListener('mousemove', updateMouseFromEvent);
  canvas.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });
  document.addEventListener('mousemove', updateMouseFromEvent);

  document.addEventListener('keydown', (e) => {
    const term = document.getElementById('terminal-wrap');
    if (e.code === 'Enter' && term && term.classList.contains('hide')) requestRearrange();
  });

  // Simple throttle: ignore triggers while a dissolve is in flight or
  // within the cooldown. No queuing — keeps scroll transitions to one motion.
  const MIN_BETWEEN = 300;
  let lastRearrangeAt = -Infinity;
  function requestRearrange() {
    const now = performance.now();
    if (fade < 1) return;
    if (now - lastRearrangeAt < MIN_BETWEEN) return;
    lastRearrangeAt = now;
    apply(false);
  }
  window.__nnRearrange = requestRearrange;

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
