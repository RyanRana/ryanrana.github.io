<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>books — Ryan Rana</title>
  <style>
    :root {
      --mono: 'SF Mono','Fira Code','Fira Mono','Courier New',monospace;
      --sans: -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      background: #0e0e10;
      color: #eee;
    }

    a.back {
      position: fixed;
      top: 20px; left: 24px;
      font-family: var(--mono);
      font-size: 11px;
      color: #777;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      z-index: 20;
      transition: color 240ms, border-color 240ms;
    }
    a.back:hover { color: #fff; border-bottom-color: #fff; }

    .hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 20;
      transition: color 240ms;
    }

    #room {
      position: absolute;
      inset: 0;
      background: #0e0e10;
      transition: background 500ms ease;
      overflow: hidden;
    }

    .switch {
      position: absolute;
      inset: 0;
      z-index: 15;
      display: block;
      text-decoration: none;
    }
    .switch.off { display: none; }

    /* ── LAMP (sits atop the shelf) ── */
    .lamp {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform: translate(-50%, 0);
      width: 260px;
      height: 120px;
      z-index: 8;
    }
    .lamp .arm {
      position: absolute;
      left: 50%;
      bottom: 16px;
      width: 4px;
      height: 70px;
      margin-left: -2px;
      background: #3a3a40;
      border-radius: 2px;
    }
    .lamp .base {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 120px;
      height: 16px;
      margin-left: -60px;
      background: #3a3a40;
      border-radius: 3px;
    }
    .lamp .shade {
      position: absolute;
      left: 50%;
      top: 0;
      width: 180px;
      height: 38px;
      margin-left: -90px;
      background: #26262a;
      border-radius: 6px 6px 2px 2px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.35);
      transition: background 320ms ease;
    }
    .lamp .bulb {
      position: absolute;
      left: 50%;
      top: 36px;
      width: 22px;
      height: 10px;
      margin-left: -11px;
      background: #555;
      border-radius: 0 0 12px 12px;
      transition: background 320ms ease, box-shadow 320ms ease;
    }

    /* ── LIGHT CONE ── */
    .light {
      position: absolute;
      left: 50%;
      top: calc(50% - 80px);
      width: 0;
      height: 0;
      margin-left: -260px;
      border-left: 260px solid transparent;
      border-right: 260px solid transparent;
      border-top: 420px solid #FFD98A;
      opacity: 0;
      filter: blur(18px);
      z-index: 3;
      transition: opacity 420ms ease;
      pointer-events: none;
    }

    /* ── SHELF ── */
    .shelf {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translateX(-50%);
      width: min(720px, 86vw);
      z-index: 6;
    }
    .plank {
      width: 100%;
      height: 10px;
      background: #2a2226;
      box-shadow: 0 2px 0 rgba(0,0,0,0.45);
      border-radius: 1px;
    }
    .books {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 140px;
      padding: 0 14px;
      margin-top: -140px;
    }
    .book {
      width: 16px;
      height: 120px;
      background: #2d2d33;
      border-radius: 1px 1px 0 0;
      box-shadow: inset -1px 0 0 rgba(0,0,0,0.35), inset 1px 0 0 rgba(255,255,255,0.03);
      transition: background 400ms ease, box-shadow 400ms ease;
      position: relative;
    }
    .book::before {
      content: "";
      position: absolute;
      top: 8px; left: 2px; right: 2px;
      height: 1px;
      background: rgba(0,0,0,0.3);
    }
    .book::after {
      content: "";
      position: absolute;
      bottom: 8px; left: 2px; right: 2px;
      height: 1px;
      background: rgba(0,0,0,0.3);
    }

    /* size + hue variety — values tuned per book, all quite muted when off */
    .b1  { width: 14px; height: 116px; background: #2e2730; }
    .b2  { width: 20px; height: 128px; background: #2a2a34; }
    .b3  { width: 13px; height: 104px; background: #33282a; }
    .b4  { width: 18px; height: 132px; background: #272e30; }
    .b5  { width: 15px; height: 110px; background: #2b2b2f; }
    .b6  { width: 22px; height: 124px; background: #302626; }
    .b7  { width: 12px; height:  96px; background: #28292d; }
    .b8  { width: 17px; height: 118px; background: #2f2930; }
    .b9  { width: 14px; height: 108px; background: #26272b; }
    .b10 { width: 19px; height: 130px; background: #2c2226; }
    .b11 { width: 13px; height: 100px; background: #2a2d2d; }
    .b12 { width: 21px; height: 122px; background: #2d2a22; }
    .b13 { width: 15px; height: 112px; background: #272d2a; }
    .b14 { width: 16px; height: 118px; background: #2b252a; }
    .b15 { width: 20px; height: 126px; background: #2a2c32; }
    .b16 { width: 13px; height: 102px; background: #2c2830; }
    .b17 { width: 18px; height: 120px; background: #2e2a28; }
    .b18 { width: 14px; height: 110px; background: #29262d; }
    .b19 { width: 22px; height: 128px; background: #2a2a2a; }
    .b20 { width: 16px; height: 114px; background: #2d2830; }
    .b21 { width: 17px; height: 122px; background: #2a2d2e; }
    .b22 { width: 14px; height: 106px; background: #302828; }
    .b23 { width: 20px; height: 126px; background: #262b2d; }

    .floor {
      position: absolute;
      left: 0; right: 0;
      top: calc(50% + 20px);
      height: 50%;
      background: linear-gradient(180deg, #0e0e10 0%, #09090b 100%);
      z-index: 1;
    }

    /* ── LIT STATE ── */
    #room:target { background: #1a160f; }
    #room:target .switch.on { display: none; }
    #room:target .switch.off { display: block; }
    #room:target .light { opacity: 0.9; }
    #room:target .shade { background: #2c2822; }
    #room:target .bulb {
      background: #FFE6A1;
      box-shadow: 0 0 20px 6px rgba(255, 220, 140, 0.55);
    }
    #room:target .plank { background: #3a2f26; }
    #room:target .book { box-shadow: inset -1px 0 0 rgba(0,0,0,0.2), inset 1px 0 0 rgba(255,240,200,0.06); }
    #room:target .b1  { background: #6b4a52; }
    #room:target .b2  { background: #5f6380; }
    #room:target .b3  { background: #7a4a3b; }
    #room:target .b4  { background: #4a6668; }
    #room:target .b5  { background: #5a5656; }
    #room:target .b6  { background: #7a3e3e; }
    #room:target .b7  { background: #4d5066; }
    #room:target .b8  { background: #6d4e5a; }
    #room:target .b9  { background: #4a4d5c; }
    #room:target .b10 { background: #73424a; }
    #room:target .b11 { background: #456864; }
    #room:target .b12 { background: #7a6a3a; }
    #room:target .b13 { background: #4a6e54; }
    #room:target .b14 { background: #5e3e4c; }
    #room:target .b15 { background: #455370; }
    #room:target .b16 { background: #604a6e; }
    #room:target .b17 { background: #6d5c44; }
    #room:target .b18 { background: #5a4366; }
    #room:target .b19 { background: #554f46; }
    #room:target .b20 { background: #5a4060; }
    #room:target .b21 { background: #436063; }
    #room:target .b22 { background: #72504a; }
    #room:target .b23 { background: #3f5d6a; }

    #room:target ~ .hint { color: #8a7c5a; }

    @media (max-width: 720px) {
      .shelf { width: 94vw; }
      .books { gap: 2px; padding: 0 8px; }
      .book { width: 11px !important; }
      .b1  { height: 96px; } .b2  { height: 108px; } .b3  { height: 88px; }
      .b4  { height: 110px; } .b5  { height: 92px; } .b6  { height: 104px; }
      .b7  { height: 82px; } .b8  { height: 100px; } .b9  { height: 90px; }
      .b10 { height: 110px; } .b11 { height: 86px; } .b12 { height: 104px; }
      .b13 { height: 94px; } .b14 { height: 100px; } .b15 { height: 106px; }
      .b16 { height: 88px; } .b17 { height: 102px; } .b18 { height: 92px; }
      .b19 { height: 108px; } .b20 { height: 96px; } .b21 { height: 104px; }
      .b22 { height: 90px; } .b23 { height: 106px; }
      .lamp { width: 180px; height: 90px; }
      .lamp .shade { width: 130px; height: 28px; margin-left: -65px; }
      .lamp .arm { height: 50px; bottom: 12px; }
      .lamp .base { width: 84px; height: 12px; margin-left: -42px; }
      .lamp .bulb { top: 26px; }
      .light {
        margin-left: -180px;
        border-left: 180px solid transparent;
        border-right: 180px solid transparent;
        border-top: 320px solid #FFD98A;
      }
    }
  </style>
</head>
<body>

<a class="back" href="../index.html">← back</a>

<div id="room">
  <a href="#room" class="switch on" title="turn on"></a>
  <a href="#" class="switch off" title="turn off"></a>

  <div class="light"></div>

  <div class="lamp">
    <div class="shade"></div>
    <div class="bulb"></div>
    <div class="arm"></div>
    <div class="base"></div>
  </div>

  <div class="shelf">
    <div class="books">
      <div class="book b1"></div><div class="book b2"></div><div class="book b3"></div>
      <div class="book b4"></div><div class="book b5"></div><div class="book b6"></div>
      <div class="book b7"></div><div class="book b8"></div><div class="book b9"></div>
      <div class="book b10"></div><div class="book b11"></div><div class="book b12"></div>
      <div class="book b13"></div><div class="book b14"></div><div class="book b15"></div>
      <div class="book b16"></div><div class="book b17"></div><div class="book b18"></div>
      <div class="book b19"></div><div class="book b20"></div><div class="book b21"></div>
      <div class="book b22"></div><div class="book b23"></div>
    </div>
    <div class="plank"></div>
  </div>

  <div class="floor"></div>
</div>

<p class="hint">click to toggle</p>

</body>
</html>
