<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>neural net (archive)</title>
  <style>
    :root {
      --mono: 'SF Mono','Fira Code','Fira Mono','Courier New',monospace;
      --sans: -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #fff; color: #000; font-family: var(--sans); overflow: hidden; }
    .top {
      position: fixed; top: 20px; left: 24px; z-index: 2;
      display: flex; flex-direction: column; gap: 4px;
    }
    a.back {
      font-family: var(--mono);
      font-size: 11px;
      color: #666;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      align-self: flex-start;
    }
    a.back:hover { color: #000; border-bottom-color: #000; }
    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      text-transform: lowercase;
    }
    .sub {
      color: #777;
      font-size: 0.78rem;
      font-family: var(--mono);
    }
    .hint {
      position: fixed; bottom: 18px; right: 24px; z-index: 2;
      font-family: var(--mono); font-size: 10px; color: #999;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .hint kbd {
      display: inline-block;
      border: 1px solid #bbb;
      border-radius: 3px;
      padding: 1px 5px;
      font: inherit;
      color: #555;
      background: #fff;
    }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <div class="top">
    <a class="back" href="../index.html">← back</a>
    <h1>neural net</h1>
    <p class="sub">// archived — the original hero visual</p>
  </div>
  <canvas id="nn-canvas"></canvas>
  <p class="hint"><kbd>enter</kbd> rearrange &nbsp; <kbd>move</kbd> disturb</p>

<script>
(function () {
  const canvas = document.getElementById('nn-canvas');
  const ctx    = canvas.getContext('2d');

  let W = 0, H = 0;
  let mouse = { x: -999, y: -999 };

  const PULL = 0.32, SPRING = 0.05, DRAG = 0.85, MAX_SPD = 12, FADE_MS = 500;

  function getConfig(width) {
    if (width < 520)  return { N: 30,  START: [3, 6, 7, 7, 5, 2],                       R: 3,   MOUSE_R: 150, maxH: 8 };
    if (width < 900)  return { N: 54,  START: [3, 7, 10, 11, 9, 7, 5, 2],               R: 3.8, MOUSE_R: 210, maxH: 13 };
    if (width < 1400) return { N: 76,  START: [3, 9, 13, 15, 14, 10, 7, 3, 2],          R: 3.4, MOUSE_R: 250, maxH: 17 };
    if (width < 2000) return { N: 102, START: [3, 11, 15, 18, 19, 15, 10, 6, 3, 2],     R: 3,   MOUSE_R: 290, maxH: 21 };
    return { N: 132, START: [3, 12, 17, 22, 24, 22, 16, 9, 5, 2],                       R: 2.7, MOUSE_R: 330, maxH: 24 };
  }

  let config = getConfig(window.innerWidth);
  let nodes = [];
  let targets = [];
  let prevEdges = [], nextEdges = [];
  let fade = 1;
  let usedKeys = new Set();

  function randSizes() {
    const { N, maxH } = config;
    const inOut = 3 + 2;
    let rem = N - inOut;
    for (let a = 0; a < 400; a++) {
      const nl = 4 + Math.floor(Math.random() * 6);
      let left = rem;
      const sizes = [];
      for (let L = 0; L < nl - 2; L++) {
        const last = L === nl - 3;
        const hi = Math.min(maxH, left - (nl - 3 - L));
        if (hi < 2) { left = -1; break; }
        const n = last ? left : 2 + Math.floor(Math.random() * (hi - 1));
        sizes.push(n);
        left -= n;
      }
      if (left !== 0) continue;
      const ls = [3, ...sizes, 2];
      const key = ls.join(',');
      if (ls.reduce((a,b)=>a+b,0) === N && !usedKeys.has(key)) {
        usedKeys.add(key);
        return ls;
      }
    }
    usedKeys.clear();
    return config.START.slice();
  }

  function buildLayout(ls) {
    const pos = [], edg = [];
    const mX = W * 0.06, mY = H * 0.05;
    const uW = W - mX * 2;
    const nl = ls.length;
    let idx = 0;
    const starts = [];
    const maxGap = config.N <= 30 ? 44 : config.N <= 54 ? 34 : config.N <= 76 ? 28 : 24;
    for (let L = 0; L < nl; L++) {
      const cnt = ls[L];
      starts.push(idx);
      const bx = mX + (L / (nl - 1)) * uW;
      const gap = Math.min((H - mY * 2) / (cnt + 1), maxGap);
      const sy  = H / 2 - (gap * (cnt - 1)) / 2;
      for (let i = 0; i < cnt; i++) {
        pos.push({ x: bx, y: sy + i * gap });
        idx++;
      }
    }
    for (let L = 0; L < nl - 1; L++)
      for (let i = 0; i < ls[L]; i++)
        for (let j = 0; j < ls[L+1]; j++)
          edg.push({ from: starts[L]+i, to: starts[L+1]+j });
    return { pos, edg };
  }

  function apply(ls, instant) {
    const { pos, edg } = buildLayout(ls);
    targets = pos;
    if (instant) { prevEdges = edg; nextEdges = edg; fade = 1; }
    else         { prevEdges = nextEdges.length ? nextEdges : edg; nextEdges = edg; fade = 0; }
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    W = window.innerWidth;
    H = window.innerHeight;
    const newConfig = getConfig(W);
    config = newConfig;

    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (nodes.length !== config.N) {
      nodes = [];
      for (let i = 0; i < config.N; i++)
        nodes.push({ x: 0, y: 0, vx: 0, vy: 0 });
      targets = [];
      prevEdges = [];
      nextEdges = [];
      usedKeys = new Set();
    }

    apply(config.START, true);
    for (let i = 0; i < config.N; i++) {
      nodes[i].x = targets[i].x;
      nodes[i].y = targets[i].y;
      nodes[i].vx = 0;
      nodes[i].vy = 0;
    }
  }

  function tick(dt) {
    const N = config.N, R = config.MOUSE_R;
    if (fade < 1) fade = Math.min(1, fade + dt / FADE_MS);
    const dn = Math.min(dt / 16, 2);
    for (let i = 0; i < N; i++) {
      const n = nodes[i], t = targets[i];
      n.vx += (t.x - n.x) * SPRING * dn;
      n.vy += (t.y - n.y) * SPRING * dn;
      const dx = mouse.x - n.x, dy = mouse.y - n.y;
      const d  = Math.hypot(dx, dy) || 0.001;
      if (d < R) {
        const f = PULL * (1 - d / R) * dn;
        n.vx += dx / d * f; n.vy += dy / d * f;
      }
      n.vx *= DRAG; n.vy *= DRAG;
      const spd = Math.hypot(n.vx, n.vy);
      if (spd > MAX_SPD) { n.vx = n.vx/spd*MAX_SPD; n.vy = n.vy/spd*MAX_SPD; }
      n.x += n.vx; n.y += n.vy;
    }
  }

  function drawEdges(list, alpha) {
    if (!alpha || !list.length) return;
    const N = config.N;
    const lineW = N <= 30 ? 0.6 : N <= 54 ? 0.5 : N <= 76 ? 0.45 : 0.4;
    const baseAlpha = N <= 30 ? 0.3 : N <= 54 ? 0.24 : N <= 76 ? 0.2 : 0.16;
    ctx.strokeStyle = `rgba(0,0,0,${(alpha * baseAlpha).toFixed(3)})`;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    for (const e of list) {
      const a = nodes[e.from], b = nodes[e.to];
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
    }
    ctx.stroke();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawEdges(prevEdges, 1 - fade);
    drawEdges(nextEdges, fade);
    const R = config.R;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.78)';
    ctx.lineWidth = 1;
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, R, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  }

  let last = performance.now();
  function loop(now) {
    tick(Math.min(50, now - last));
    last = now;
    render();
    requestAnimationFrame(loop);
  }

  function updateMouse(e) { mouse.x = e.clientX; mouse.y = e.clientY; }
  window.addEventListener('mousemove', updateMouse);
  window.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      apply(randSizes(), false);
    }
  });

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
