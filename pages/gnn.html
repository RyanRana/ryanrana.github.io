<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gnn</title>
  <style>
    :root {
      --mono: 'SF Mono','Fira Code','Fira Mono','Courier New',monospace;
      --sans: -apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #fff; color: #000; font-family: var(--sans); overflow: hidden; }
    .top {
      position: fixed; top: 20px; left: 24px; z-index: 2;
      display: flex; flex-direction: column; gap: 4px;
    }
    a.back {
      font-family: var(--mono);
      font-size: 11px;
      color: #666;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      align-self: flex-start;
    }
    a.back:hover { color: #000; border-bottom-color: #000; }
    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      text-transform: lowercase;
    }
    .sub {
      color: #777;
      font-size: 0.78rem;
      font-family: var(--mono);
    }
    .hint {
      position: fixed; bottom: 18px; right: 24px; z-index: 2;
      font-family: var(--mono); font-size: 10px; color: #999;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .hint kbd {
      display: inline-block;
      border: 1px solid #bbb;
      border-radius: 3px;
      padding: 1px 5px;
      font: inherit;
      color: #555;
      background: #fff;
    }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <div class="top">
    <a class="back" href="../index.html">← back</a>
    <h1>graph neural net</h1>
    <p class="sub">// message passing over a rearranging topology</p>
  </div>
  <canvas id="g"></canvas>
  <p class="hint"><kbd>enter</kbd> rearrange &nbsp; <kbd>move</kbd> disturb</p>

<script>
(function () {
  const canvas = document.getElementById('g');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  const mouse = { x: -999, y: -999 };

  const PULL = 0.32, SPRING = 0.045, DRAG = 0.86, MAX_SPD = 12, FADE_MS = 600;

  function getConfig(w) {
    if (w < 520)  return { N: 36, R: 3.4, MOUSE_R: 140, kMin: 2, kMax: 3 };
    if (w < 900)  return { N: 70, R: 3.2, MOUSE_R: 200, kMin: 2, kMax: 4 };
    if (w < 1400) return { N: 110, R: 3,  MOUSE_R: 250, kMin: 3, kMax: 5 };
    if (w < 2000) return { N: 150, R: 2.8, MOUSE_R: 300, kMin: 3, kMax: 5 };
    return { N: 200, R: 2.6, MOUSE_R: 340, kMin: 3, kMax: 6 };
  }

  let config = getConfig(window.innerWidth);
  let nodes = [];
  let targets = [];
  let prevEdges = [], nextEdges = [];
  let fade = 1;
  let pulses = [];
  let pulseEdges = [];

  function randLayout() {
    const N = config.N;
    const pos = [];
    const cx = W / 2, cy = H / 2;
    const clusters = 2 + Math.floor(Math.random() * 3);
    const centers = [];
    const rad = Math.min(W, H) * 0.32;
    for (let k = 0; k < clusters; k++) {
      const a = (k / clusters) * Math.PI * 2 + Math.random() * 0.8;
      const rr = rad * (0.4 + Math.random() * 0.5);
      centers.push({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr });
    }
    for (let i = 0; i < N; i++) {
      const c = centers[i % clusters];
      const spread = Math.min(W, H) * (0.08 + Math.random() * 0.14);
      const a = Math.random() * Math.PI * 2;
      const r = spread * Math.sqrt(Math.random());
      pos.push({ x: c.x + Math.cos(a) * r, y: c.y + Math.sin(a) * r });
    }
    return pos;
  }

  function buildEdges(pos) {
    const N = pos.length;
    const edg = [];
    const seen = new Set();
    const kMin = config.kMin, kMax = config.kMax;
    const neighbors = [];
    for (let i = 0; i < N; i++) {
      const dists = [];
      for (let j = 0; j < N; j++) {
        if (i === j) continue;
        const dx = pos[i].x - pos[j].x, dy = pos[i].y - pos[j].y;
        dists.push({ j, d: dx * dx + dy * dy });
      }
      dists.sort((a, b) => a.d - b.d);
      const k = kMin + Math.floor(Math.random() * (kMax - kMin + 1));
      neighbors.push(dists.slice(0, k).map(x => x.j));
    }
    for (let i = 0; i < N; i++) {
      for (const j of neighbors[i]) {
        const key = i < j ? i + '-' + j : j + '-' + i;
        if (seen.has(key)) continue;
        seen.add(key);
        edg.push({ from: i, to: j });
      }
    }
    const shortcuts = Math.floor(N * 0.04);
    for (let s = 0; s < shortcuts; s++) {
      const i = Math.floor(Math.random() * N);
      const j = Math.floor(Math.random() * N);
      if (i === j) continue;
      const key = i < j ? i + '-' + j : j + '-' + i;
      if (seen.has(key)) continue;
      seen.add(key);
      edg.push({ from: i, to: j });
    }
    return edg;
  }

  function apply(instant) {
    const pos = randLayout();
    const edg = buildEdges(pos);
    targets = pos;
    if (instant) {
      prevEdges = edg; nextEdges = edg; fade = 1;
    } else {
      prevEdges = nextEdges.length ? nextEdges : edg;
      nextEdges = edg; fade = 0;
    }
    pulseEdges = edg;
    pulses = [];
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    W = window.innerWidth;
    H = window.innerHeight;
    const next = getConfig(W);
    const sizeChanged = next.N !== config.N;
    config = next;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (sizeChanged || nodes.length !== config.N) {
      nodes = [];
      for (let i = 0; i < config.N; i++) nodes.push({ x: 0, y: 0, vx: 0, vy: 0 });
    }
    apply(true);
    for (let i = 0; i < config.N; i++) {
      nodes[i].x = targets[i].x;
      nodes[i].y = targets[i].y;
      nodes[i].vx = 0; nodes[i].vy = 0;
    }
  }

  let spawnT = 0;
  function tick(dt) {
    const N = config.N, R = config.MOUSE_R;
    if (fade < 1) fade = Math.min(1, fade + dt / FADE_MS);
    const dn = Math.min(dt / 16, 2);
    for (let i = 0; i < N; i++) {
      const n = nodes[i], t = targets[i];
      n.vx += (t.x - n.x) * SPRING * dn;
      n.vy += (t.y - n.y) * SPRING * dn;
      const dx = mouse.x - n.x, dy = mouse.y - n.y;
      const d = Math.hypot(dx, dy) || 0.001;
      if (d < R) {
        const f = PULL * (1 - d / R) * dn;
        n.vx += dx / d * f; n.vy += dy / d * f;
      }
      n.vx *= DRAG; n.vy *= DRAG;
      const spd = Math.hypot(n.vx, n.vy);
      if (spd > MAX_SPD) { n.vx = n.vx / spd * MAX_SPD; n.vy = n.vy / spd * MAX_SPD; }
      n.x += n.vx; n.y += n.vy;
    }

    spawnT += dt;
    const spawnEvery = Math.max(40, 220 - N);
    while (spawnT > spawnEvery) {
      spawnT -= spawnEvery;
      if (pulseEdges.length) {
        const burst = 1 + Math.floor(Math.random() * 3);
        for (let b = 0; b < burst; b++) {
          const e = pulseEdges[Math.floor(Math.random() * pulseEdges.length)];
          pulses.push({ from: e.from, to: e.to, p: 0, speed: 0.45 + Math.random() * 0.8 });
        }
      }
    }
    for (const p of pulses) p.p += (dt / 900) * p.speed;
    for (let i = pulses.length - 1; i >= 0; i--) if (pulses[i].p >= 1) pulses.splice(i, 1);
  }

  function drawEdges(list, alpha) {
    if (!alpha || !list.length) return;
    const N = config.N;
    const lineW = N <= 36 ? 0.55 : N <= 70 ? 0.5 : N <= 110 ? 0.45 : 0.4;
    const baseAlpha = N <= 36 ? 0.28 : N <= 70 ? 0.22 : N <= 110 ? 0.18 : 0.15;
    ctx.strokeStyle = `rgba(0,0,0,${(alpha * baseAlpha).toFixed(3)})`;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    for (const e of list) {
      const a = nodes[e.from], b = nodes[e.to];
      if (!a || !b) continue;
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    }
    ctx.stroke();
  }

  function drawPulses() {
    for (const pu of pulses) {
      const a = nodes[pu.from], b = nodes[pu.to];
      if (!a || !b) continue;
      const x = a.x + (b.x - a.x) * pu.p;
      const y = a.y + (b.y - a.y) * pu.p;
      const fadeIn = Math.min(1, pu.p * 4);
      const fadeOut = 1 - pu.p;
      const al = fadeIn * fadeOut;
      ctx.fillStyle = `rgba(0,0,0,${al.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(x, y, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawEdges(prevEdges, 1 - fade);
    drawEdges(nextEdges, fade);
    drawPulses();
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth = 1;
    const R = config.R;
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, R, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
  }

  let last = performance.now();
  function loop(now) {
    tick(Math.min(50, now - last));
    last = now;
    render();
    requestAnimationFrame(loop);
  }

  function updateMouse(e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  }
  window.addEventListener('mousemove', updateMouse);
  window.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      apply(false);
    }
  });

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
