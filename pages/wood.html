<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft — Ryan Rana</title>
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --gray: #6e6e73;
      --gray-light: #8e8e93;
      --rule: rgba(0,0,0,0.09);
      --sans: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100%;
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #nav {
      flex-shrink: 0;
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      border-bottom: 1px solid var(--rule);
    }
    .nav-name {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }
    .nav-name:hover { opacity: 0.7; }
    .nav-back {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--black); }
    main {
      flex: 1;
      padding: var(--space-12) 44px var(--space-10);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      gap: var(--space-10);
    }
    .gallery-item {
      display: block;
      width: 100%;
    }
    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .gallery-item figcaption {
      font-size: 0.85rem;
      color: var(--gray);
      margin-top: var(--space-3);
      line-height: 1.5;
    }
    @media (max-width: 720px) {
      #nav { padding: 0 24px; }
      main { padding: var(--space-8) 24px var(--space-10); }
    }
  </style>
</head>
<body>
<div id="app">
  <nav id="nav">
    <a class="nav-back" href="../index.html">← Back</a>
    <a class="nav-name" href="../index.html">Ryan Rana</a>
  </nav>
  <main>
    <div class="gallery" id="gallery"></div>
  </main>
</div>
<script>
(function () {
  var gallery = document.getElementById('gallery');
  fetch('../data/woodworking.json')
    .then(function (r) { return r.ok ? r.json() : {}; })
    .catch(function () { return {}; })
    .then(function (data) {
      if (!data.images || !data.images.length) return;
      data.images.forEach(function (img) {
        var figure = document.createElement('figure');
        figure.className = 'gallery-item';
        var image = document.createElement('img');
        image.src = img.src;
        image.alt = img.alt || '';
        image.loading = 'lazy';
        figure.appendChild(image);
        if (img.description && img.description.trim()) {
          var cap = document.createElement('figcaption');
          cap.textContent = img.description.trim();
          figure.appendChild(cap);
        }
        gallery.appendChild(figure);
      });
    });
})();
</script>
</body>
</html>
